function cleanTextForSpeech(text) {
  if (!text) return "";
  try {
    // הסרת אימוג'ים
    let cleaned = text.replace(/\p{Extended_Pictographic}/gu, "").replace(/\s+/g, " ").trim();
    
    // החלת תיקוני הגייה
    for (const [pattern, replacement] of TTS_FIXES) {
      cleaned = cleaned.replace(pattern, replacement);
    }
    
    return cleaned;
  } catch (e) {
    // fallback ללא תיקוני TTS אם משהו נכשל
    return text.replace(/[\u{1F300}-\u{1FAFF}]|[\u{2600}-\u{27BF}]/gu, "").replace(/\s+/g, " ").trim();
  }
}

function loadVoices() {
  return new Promise((resolve) => {
    if (!window.speechSynthesis) { resolve([]); return; }
    let voices = window.speechSynthesis.getVoices();
    if (voices.length > 0) { availableVoices = voices; resolve(voices); return; }
    
    // אנדרואיד טוען קולות באיחור
    let resolved = false;
    const finish = (vs) => { if (!resolved) { resolved = true; availableVoices = vs; resolve(vs); } };
    
    window.speechSynthesis.onvoiceschanged = () => {
      const vs = window.speechSynthesis.getVoices();
      if (vs.length > 0) finish(vs);
    };
    
    // נסה כמה פעמים — אנדרואיד לפעמים זקוק לזה
    let attempts = 0;
    const tryAgain = () => {
      attempts++;
      const vs = window.speechSynthesis?.getVoices() || [];
      if (vs.length > 0) finish(vs);
      else if (attempts < 10) setTimeout(tryAgain, 300);
      else finish([]);
    };
    setTimeout(tryAgain, 100);
  });
}

function readAloud(text, type) {
  if (!text) return false;
  if (!window.speechSynthesis) {
    console.warn("Browser does not support speechSynthesis");
    return false;
  }
  try {
    if (window.speechSynthesis.paused) window.speechSynthesis.resume();
    window.speechSynthesis.cancel();
    
    if (availableVoices.length === 0) {
      availableVoices = window.speechSynthesis.getVoices() || [];
    }
    
    setTimeout(() => {
      // נקה אימוג'ים, אבל אם נשאר ריק — השתמש בטקסט המקורי
      let cleanText;
      try {
        cleanText = cleanTextForSpeech(text);
        if (!cleanText || cleanText.length < 1) cleanText = text;
      } catch (e) {
        cleanText = text;

      u.rate = v.rate;

      // חיפוש קול עברי
      const heVoice = voices.find(vc => vc.lang === "he-IL") || voices.find(vc => vc.lang?.startsWith("he"));
      if (heVoice) {
        u.voice = heVoice;
        u.lang = heVoice.lang;
      }
      
      u.onerror = (ev) => {
        console.warn("TTS error:", ev.error || ev);
        // ניסיון fallback פשוט בלי לבחור קול
        try {
          const fallback = new SpeechSynthesisUtterance(cleanText);
          fallback.lang = "he-IL";
          fallback.rate = v.rate;
          fallback.pitch = v.pitch;
          fallback.volume = 1;
          window.speechSynthesis.speak(fallback);
        } catch (e) {
          console.warn("Fallback failed:", e);
        }
      };
      
      window.speechSynthesis.speak(u);
    }, 100);
    
    return true;
  } catch (e) {
    console.warn("TTS error:", e);
    return false;
  }
}

/* כפתור רמקול — לוחצים ושומעים את הטקסט */
function SpeakBtn({ text, size = 36 }) {
  const [active, setActive] = useState(false);
  const timerRef = useRef(null);

  const handleClick = (e) => {
    e.stopPropagation();
    if (active) {
      window.speechSynthesis?.cancel();
      setActive(false);
      clearTimeout(timerRef.current);
    } else {
      readAloud(text);
      setActive(true);
      // עצור אוטומטית אחרי זמן לפי אורך הטקסט
      timerRef.current = setTimeout(() => setActive(false), Math.max(3000, text.length * 100));
    }
  };

  useEffect(() => () => clearTimeout(timerRef.current), []);

  return (
    <button
      onClick={handleClick}
      title={active ? "לחץ לעצירה" : "לחץ לשמיעה בקול"}
      style={{
        background: active ? C.coral : C.sunL,
        border: `2.5px solid ${active ? C.coral : C.sun}`,
        borderRadius: "50%",
        width: size, height: size,
        cursor: "pointer",
        fontSize: size * 0.48,
        display: "flex", alignItems: "center", justifyContent: "center",
        flexShrink: 0,
        transition: "all .2s",
        boxShadow: active ? `0 0 12px ${C.coral}99` : `0 2px 6px ${C.sun}44`,
        animation: active ? "pulse 1s ease infinite" : "none",
      }}
    >
      {active ? "⏹" : "🔊"}
    </button>
  );
}

/* ══════════════════════════════════════════
   מיקרופון — לוחצים ומדברים, הטקסט נכתב
══════════════════════════════════════════ */
function MicBtn({ onResult, size = 42, label = "דבר בקול" }) {
  const [listening, setListening] = useState(false);
  const recRef = useRef(null);

  const toggle = async (e) => {
    e.stopPropagation();
    if (listening) {
      recRef.current?.stop();
      setListening(false);
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      alert("🎙️ זיהוי קול לא נתמך בדפדפן זה.\nנסה Google Chrome או Safari.");
      return;
    }
    // ודא הרשאת מיקרופון
    try {
      if (navigator.mediaDevices?.getUserMedia) {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(t => t.stop());
      }
    } catch {
      alert("❌ אין הרשאת מיקרופון.\nאשר אותה בהגדרות הדפדפן (לחץ על האייקון 🔒 בכתובת).");
      return;
    }
    try {
      const r = new SR();
      r.lang = "he-IL";
      r.continuous = false;
      r.interimResults = false;
      r.onresult = (ev) => {
        const t = ev.results[0][0].transcript;
        setListening(false);
        onResult(t);
      };
      r.onerror = (ev) => {
        setListening(false);
        if (ev.error === "not-allowed") alert("❌ אין הרשאת מיקרופון. אשר אותה בהגדרות הדפדפן.");
        else if (ev.error === "no-speech") alert("🤫 לא שמעתי כלום. נסה שוב!");
        else if (ev.error !== "aborted") console.warn("Mic error:", ev.error);
      };
      r.onend = () => setListening(false);
      recRef.current = r;
      r.start();
      setListening(true);
    } catch (err) {
      setListening(false);
      console.warn("Recognition error:", err);
    }
  };

  return (
    <button
      onClick={toggle}
      title={listening ? "לחץ לעצירה" : label}
      style={{
        background: listening ? C.coral : C.mintL,
        border: `2.5px solid ${listening ? C.coral : C.mint}`,
        borderRadius: "50%",
        width: size, height: size,
        cursor: "pointer",
        fontSize: size * 0.44,
        display: "flex", alignItems: "center", justifyContent: "center",
        flexShrink: 0,
        transition: "all .2s",
        boxShadow: listening ? `0 0 16px ${C.coral}99` : `0 2px 6px ${C.mint}44`,
        animation: listening ? "pulse 1s ease infinite" : "none",
      }}
    >
      {listening ? "⏺" : "🎙️"}
    </button>
  );
}

          width: "100%",
          background: "transparent",
          border: "none",
          padding: "13px 16px",
          cursor: disabled ? "default" : "pointer",
          fontFamily: "'Varela Round', sans-serif",
          fontSize: 15,
          color: C.dark,
          textAlign: "right",
          display: "flex",
          alignItems: "center",
          gap: 10,
          direction: "rtl",
        }}
      >
        <span style={{ fontSize: 22, flexShrink: 0 }}>
          {isChosen ? (isGood ? "✅" : "❌") : "💭"}
        </span>
        <span style={{ flex: 1, lineHeight: 1.5 }}>{text}</span>
      </button>

      {/* שורת כפתורי קול */}
      <div style={{
        borderTop: `1.5px solid ${border}44`,
        background: "#F7F7FF",
        padding: "7px 14px",
        display: "flex",
        alignItems: "center",
        gap: 10,
        direction: "rtl",
      }}>
        <SpeakBtn text={text} size={30} />
        <span style={{ fontFamily: "'Varela Round', sans-serif", fontSize: 11, color: C.soft }}>
          🔊 לחץ לשמוע
        </span>
        <div style={{ flex: 1 }} />
        <MicBtn
          size={30}
          label="אמור בקול ובחר!"
          onResult={() => { if (!disabled) onClick(); }}
        />
        <span style={{ fontFamily: "'Varela Round', sans-serif", fontSize: 11, color: C.mint }}>
          🎙️ אמור ובחר
        </span>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   SCENARIO PLAYER — מנוע הסיפור
══════════════════════════════════════════ */
function ScenarioPlayer({ sc, onBack, onWin }) {
  const [stepId, setStepId] = useState(sc.steps[0].id);
  const [chosen, setChosen] = useState(null); // index
  const [tip, setTip] = useState(null);
  const [busy, setBusy] = useState(false);
  const [showContinue, setShowContinue] = useState(false);
  const [showFreeAnswer, setShowFreeAnswer] = useState(false); // מסך תשובה חופשית
  const [freeText, setFreeText] = useState(""); // הטקסט שהילד כתב/דיבר
  const [evaluating, setEvaluating] = useState(false); // מצב הערכת AI
  const bottomRef = useRef(null);

  const getStep = (id) => sc.steps.find(s => s.id === id);
  const step = getStep(stepId);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: "smooth" });
    setShowContinue(false);
    if (step && step.type === "char" && step.next) {
      const t = setTimeout(() => setShowContinue(true), 1500);
      return () => clearTimeout(t);
    }
  }, [stepId]);

  const advanceManually = () => {
    if (step && step.next) {
      setStepId(step.next);
      setChosen(null);
      setTip(null);
      setShowContinue(false);
    }
  };

  const pick = (choice, idx) => {
    if (busy || chosen !== null) return;
    setChosen(idx);
    setBusy(true);
    setTip({ text: choice.tip, good: choice.good, nextId: choice.next });
    setTimeout(() => {
      setShowContinue(true);
      setBusy(false);
    }, 2500);
  };

  const continueAfterChoice = () => {
    if (!tip || !tip.nextId) return;
    setStepId(tip.nextId);
    setChosen(null);
    setTip(null);
    setShowContinue(false);
    if (getStep(tip.nextId)?.type === "end" && getStep(tip.nextId)?.good) {
      onWin();
    }
  };

  // הערכת תשובה חופשית עם AI
  const evaluateFreeAnswer = async () => {
    if (!freeText.trim() || evaluating) return;
    setEvaluating(true);
    const userGender = (() => { try { return localStorage.getItem("kq_gender") || ""; } catch { return ""; } })();
    const genderInstruction = userGender === "boy" 
      ? "המשתמש הוא ילד (זכר). השתמש בלשון זכר: 'אתה', 'שלך' (זכר), 'תוכל' וכו'."
      : userGender === "girl"
      ? "המשתמשת היא ילדה (נקבה). השתמש בלשון נקבה: 'את', 'שלך' (נקבה), 'תוכלי' וכו'."
      : "המגדר לא ידוע. השתמש בלשון ניטרלית או 'את/ה'.";
    
    try {
      const r = await fetch("https://keshet-ai-proxy.asisi27.workers.dev", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 400,
          system: `אתה יועץ חינוכי לילדים על הספקטרום האוטיסטי. תן משוב חיובי, רך ומעודד על תשובה של ילד בסימולציה חברתית.
מצב: ${sc.intro}
שאלה: ${step.prompt}

⚠️ חשוב: ${genderInstruction}

ענה תמיד בעברית תקנית ופשוטה. בתשובה כלול:
1. ⭐ נקודות חזקות (מה היה טוב — בלשון מעודדת)
2. 💡 טיפ לשיפור (אם צריך — קל ולא ביקורתי)
3. ציון פשוט: "טוב" / "מעולה" / "אפשר טוב יותר"
מקסימום 3-4 משפטים סך הכל.`,
          messages: [{ role: "user", content: `התשובה שלי: "${freeText.trim()}"` }],
        }),
      });
      const d = await r.json();
      let feedback = d.content?.[0]?.text || "תשובה יפה! המשך כך 🌟";
      
      // קבע אם זה היה טוב לפי תוכן המשוב
      const isGood = feedback.includes("מעולה") || feedback.includes("מצוין") || feedback.includes("נהדר") || feedback.includes("⭐");
      
      // מצא את הצעד הבא — תשובה חיובית הולכת ל-end_good או end_great, אחרת end_ok
      const nextStep = isGood 
        ? (sc.steps.find(s => s.id === "end_great") || sc.steps.find(s => s.id === "end_good") || sc.steps[sc.steps.length - 1])
        : (sc.steps.find(s => s.id === "end_ok") || sc.steps.find(s => s.id === "end_good") || sc.steps[sc.steps.length - 1]);
      
      setTip({ text: feedback, good: isGood, nextId: nextStep.id });
      setShowFreeAnswer(false);
      setFreeText("");
      setShowContinue(true);
    } catch (e) {
      setTip({ text: "תשובה יפה! בפעם הבאה ננסה שוב 💜", good: true, nextId: sc.steps.find(s => s.id === "end_good")?.id || sc.steps[sc.steps.length - 1].id });
      setShowFreeAnswer(false);
      setFreeText("");
      setShowContinue(true);
    }
    setEvaluating(false);
  };

  if (!step) return null;

  // מסך סיום
  if (step.type === "end") {
    return (
      <div style={{
        minHeight: "100vh",
        background: step.good
          ? "linear-gradient(135deg, #D4F5E2, #FFF8EE)"
          : "linear-gradient(135deg, #FFE8E8, #FFF8EE)",
        display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
        direction: "rtl", padding: 24,
      }}>
        <div style={{ textAlign: "center", maxWidth: 380 }}>
          <div style={{ fontSize: 90 }}>{step.good ? "🌟" : "💙"}</div>
          <h2 style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 26, color: C.dark, margin: "12px 0 8px" }}>
            {step.good ? "כל הכבוד!" : "ניסיון טוב!"}
          </h2>
          <p style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 15, color: C.mid, lineHeight: 1.7, marginBottom: 16 }}>
            {step.msg}
          </p>
          {/* כפתור שמיעה לטקסט הסיום */}
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 14 }}>
            <SpeakBtn text={step.msg} size={40} />
          </div>
          {step.good && (
            <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 18, color: C.sun, marginBottom: 14 }}>
              +⭐ כוכב חדש!
            </div>
          )}
          <button
            onClick={() => { setStepId(sc.steps[0].id); setChosen(null); setTip(null); setBusy(false); }}
            style={btnS(sc.color)}
          >🔄 נסה שוב</button>
          <button onClick={onBack} style={{ ...btnS(C.mid), marginTop: 8 }}>← חזור לרשימה</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: `linear-gradient(160deg, ${sc.bg} 0%, #FFF8EE 100%)`, direction: "rtl" }}>
      {/* Header */}
      <div style={{ background: "#fff", borderBottom: `3px solid ${sc.color}44`, padding: "10px 14px", position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ maxWidth: 480, margin: "0 auto", display: "flex", alignItems: "center", gap: 10 }}>
          <button onClick={onBack} style={{ ...backS, margin: 0, padding: "5px 12px" }}>← חזור</button>
          <span style={{ fontSize: 22 }}>{sc.icon}</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 16, fontWeight: 700, color: C.dark }}>{sc.title}</div>
            <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 11, color: C.mid }}>{sc.category}</div>
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 480, margin: "0 auto", padding: "16px 14px" }}>
        {/* Intro */}
        <div style={{ background: "#fff", border: `2px solid ${sc.color}44`, borderRadius: 14, padding: "12px 14px", marginBottom: 18 }}>
          <div style={{ display: "flex", gap: 8, alignItems: "flex-start" }}>
            <SpeakBtn text={sc.intro} size={30} />
            <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 14, color: C.mid, lineHeight: 1.7 }}>
              📖 {sc.intro}
            </div>
          </div>
        </div>

        {/* Node */}
        {step.type === "char" && (
          <ChatBubble
            text={step.text}
            name={step.name}
            avatar={step.avatar}
            isYou={false}
            color={sc.color}
          />
        )}

        {step.type === "choice" && (
          <div style={{ background: "#fff", border: `2px solid ${C.sky}33`, borderRadius: 16, padding: "14px 14px", marginBottom: 12 }}>
            {/* שאלה עם כפתור שמיעה */}
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 12 }}>
              <SpeakBtn text={step.prompt} size={30} />
              <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 15, color: C.mid, fontWeight: 700, lineHeight: 1.5 }}>
                🤔 {step.prompt}
              </div>
            </div>

            {/* הסבר על הכפתורים */}
            <div style={{ display: "flex", gap: 14, marginBottom: 12, padding: "6px 10px", background: "#F0F0FF", borderRadius: 10 }}>
              <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
                <span style={{ background: C.sunL, borderRadius: "50%", width: 24, height: 24, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13 }}>🔊</span>
                <span style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 11, color: C.mid }}>לחץ לשמוע</span>
              </div>
              <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
                <span style={{ background: C.mintL, borderRadius: "50%", width: 24, height: 24, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13 }}>🎙️</span>
                <span style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 11, color: C.mid }}>אמור בקול ובחר</span>
              </div>
            </div>

            {/* הבחירות */}
            {step.choices.map((ch, i) => (
              <ChoiceButton
                key={i}
                text={ch.text}
                onClick={() => pick(ch, i)}
                disabled={chosen !== null || showFreeAnswer}
                isChosen={chosen === i}
                isGood={ch.good}
              />
            ))}

            {/* כפתור "התשובה שלי" — תשובה חופשית */}
            {chosen === null && !tip && !showFreeAnswer && (
              <button onClick={() => setShowFreeAnswer(true)}
                style={{
                  width: "100%",
                  padding: "14px 16px",
                  marginTop: 8,
                  background: `linear-gradient(135deg, ${C.purple}, ${C.sky})`,
                  border: "2px dashed #fff",
                  borderRadius: 14,
                  color: "#fff",
                  fontFamily: "'Varela Round',sans-serif",
                  fontSize: 15,
                  fontWeight: 700,
                  cursor: "pointer",
                  boxShadow: `0 4px 12px ${C.purple}44`,
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  gap: 10,
                  animation: "fadeIn .4s ease",
                }}>
                <span style={{ fontSize: 24 }}>🎙️</span>
                <span>התשובה שלי במקום</span>
              </button>
            )}

            {/* מסך תשובה חופשית */}
            {showFreeAnswer && (
              <div style={{
                background: "#F8F0FF",
                border: `2px solid ${C.purple}`,
                borderRadius: 14,
                padding: "14px 14px",
                marginTop: 10,
                animation: "fadeIn .4s ease",
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 14, fontWeight: 700, color: C.purple }}>
                    🎙️ התשובה שלך
                  </div>
                  <button onClick={() => { setShowFreeAnswer(false); setFreeText(""); }}
                    style={{ background: "#FFE5E5", border: "none", borderRadius: 8, padding: "4px 10px", cursor: "pointer", fontFamily: "'Varela Round',sans-serif", fontSize: 12, color: C.coral }}>
                    ✕ ביטול
                  </button>
                </div>

                <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 12, color: C.mid, marginBottom: 8, lineHeight: 1.5 }}>
                  💡 דבר במיקרופון או כתוב את התשובה שלך — ה-AI ייתן לך משוב חיובי!
                </div>

                <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
                  <MicBtn onResult={t => setFreeText(p => p ? p + " " + t : t)} size={48} />
                  <textarea
                    value={freeText}
                    onChange={e => setFreeText(e.target.value)}
                    placeholder="כתוב כאן או דבר במיקרופון..."
                    style={{
                      flex: 1,
                      border: `2px solid ${C.purple}55`,
                      borderRadius: 10,
                      padding: "10px 12px",
                      fontFamily: "'Varela Round',sans-serif",
                      fontSize: 14,
                      color: C.dark,
                      direction: "rtl",
                      resize: "none",
                      minHeight: 60,
                      background: "#fff",
                    }}/>
                </div>

                {freeText.trim() && (
                  <div style={{ display: "flex", gap: 8, marginBottom: 8, padding: "8px 10px", background: "#fff", borderRadius: 8, border: `1px solid ${C.purple}33` }}>
                    <SpeakBtn text={freeText} size={26} />
                    <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 13, color: C.dark, flex: 1 }}>
                      {freeText}
                    </div>
                  </div>
                )}

                <button onClick={evaluateFreeAnswer}
                  disabled={!freeText.trim() || evaluating}
                  style={{
                    width: "100%",
                    padding: "12px 16px",
                    background: freeText.trim() && !evaluating ? `linear-gradient(135deg, ${C.mint}, ${C.teal})` : "#DDD",
                    border: "none",
                    borderRadius: 12,
                    color: "#fff",
                    fontFamily: "'Varela Round',sans-serif",
                    fontSize: 15,
                    fontWeight: 700,
                    cursor: freeText.trim() && !evaluating ? "pointer" : "not-allowed",
                    boxShadow: freeText.trim() && !evaluating ? `0 4px 12px ${C.mint}66` : "none",
                  }}>
                  {evaluating ? "⏳ ה-AI חושב..." : "✅ שלח לבדיקה"}
                </button>
              </div>
            )}

            {/* טיפ אחרי בחירה */}
            {tip && (
              <>
                <div style={{
                  background: tip.good ? "#D4F5E2" : "#FFF3CD",
                  border: `2px solid ${tip.good ? C.mint : C.sun}`,
                  borderRadius: 12,
                  padding: "11px 14px",
                  marginTop: 4,
                  display: "flex",
                  gap: 8,
                  alignItems: "center",
                  animation: "fadeIn .4s ease",
                }}>
                  <SpeakBtn text={tip.text} size={28} />
                  <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 14, color: C.dark }}>
                    {tip.good ? "🌟 " : "💡 "}{tip.text}
                  </div>
                </div>
                {showContinue && (
                  <button onClick={continueAfterChoice}
                    style={{
                      ...btnS(tip.good ? C.mint : C.sun),
                      marginTop: 12,
                      animation: "fadeIn .4s ease",
                    }}>
                    המשך לשלב הבא ←
                  </button>
                )}
                {!showContinue && (
                  <div style={{ textAlign: "center", fontFamily: "'Varela Round',sans-serif", fontSize: 12, color: C.soft, marginTop: 10 }}>
                    📖 קרא את ההסבר...
                  </div>
                )}
              </>
            )}
          </div>
        )}

        {step.type === "char" && (
          <>
            {showContinue ? (
              <button onClick={advanceManually}
                style={{
                  ...btnS(sc.color),
                  marginTop: 8,
                  animation: "fadeIn .4s ease",
                }}>
                המשך ←
              </button>
            ) : (
              <div style={{ textAlign: "center", fontFamily: "'Varela Round',sans-serif", fontSize: 13, color: C.soft, marginTop: 8 }}>
                📖 קרא בנחת...
              </div>
            )}
          </>
        )}

        <div ref={bottomRef} />
      </div>
    </div>
  );
}

function AIChatScreen({ onBack, onEarnStar }) {
  const [sel, setSel] = useState(null);
  const [msgs, setMsgs] = useState([]);
  const [inp, setInp] = useState("");
  const [loading, setLoading] = useState(false);
  const [cnt, setCnt] = useState(0);
  const [starred, setStarred] = useState(false);
  const [userGender, setUserGender] = useState(() => {
    try { return localStorage.getItem("kq_gender") || ""; } catch { return ""; }
  });
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs]);

  const selectGender = (g) => {
    setUserGender(g);
    try { localStorage.setItem("kq_gender", g); } catch {}
  };

  const start = (ch) => { setSel(ch); setMsgs([{ role: "assistant", text: ch.hello }]); setCnt(0); setStarred(false); };

  const send = async () => {
    if (!inp.trim() || loading) return;
    const um = { role: "user", text: inp.trim() };
    const nm = [...msgs, um];
    setMsgs(nm); setInp(""); setLoading(true);
    const nc = cnt + 1; setCnt(nc);
    if (nc === 5 && !starred) { setStarred(true); onEarnStar(); }
    
    // הוספת מידע על מגדר המשתמש להוראה
    const genderInstruction = userGender === "boy" 
      ? "המשתמש הוא ילד (זכר). דבר אליו בלשון זכר תמיד — 'אתה', 'שלך' (זכר), 'אתה רוצה', 'בשבילך' וכו'. אל תטעה לעולם."
      : userGender === "girl"
      ? "המשתמשת היא ילדה (נקבה). דבר אליה בלשון נקבה תמיד — 'את', 'שלך' (נקבה), 'את רוצה', 'בשבילך' וכו'. אל תטעה לעולם."
      : "המגדר של המשתמש לא ידוע — השתמש בפנייה ניטרלית או שאל בעדינות.";
    
    try {
      const r = await fetch("https://keshet-ai-proxy.asisi27.workers.dev", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 1000,

          messages: nm.map(m => ({ role: m.role === "user" ? "user" : "assistant", content: m.text })),
        }),
      });

      let reply;
      if (d.content?.[0]?.text) {
        reply = d.content[0].text;

        reply = `שגיאה: ${typeof d.error === 'string' ? d.error : (d.error.message || JSON.stringify(d.error))}`;

      }
      setMsgs(m => [...m, { role: "assistant", text: reply }]);

  );

  return (
    <div style={{ height: "100vh", background: `linear-gradient(160deg,${sel.bg} 0%,#FFF8EE 100%)`, direction: "rtl", display: "flex", flexDirection: "column" }}>
      <div style={{ background: "#fff", borderBottom: `3px solid ${sel.color}44`, padding: "9px 12px", flexShrink: 0 }}>
        <div style={{ maxWidth: 480, margin: "0 auto", display: "flex", alignItems: "center", gap: 9 }}>
          <button onClick={() => setSel(null)} style={{ ...backS, margin: 0, padding: "5px 12px" }}>←</button>
          <span style={{ fontSize: 28 }}>{sel.avatar}</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 16, fontWeight: 700, color: C.dark }}>{sel.name}</div>
            <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 11, color: C.mint }}>● מחובר</div>
          </div>
          <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 12, color: C.mid }}>{cnt}/5 {starred ? "⭐" : ""}</div>
        </div>
        <div style={{ maxWidth: 480, margin: "6px auto 0", display: "flex", gap: 5, flexWrap: "wrap" }}>
          {STARTERS.map(s => (
            <button key={s} onClick={() => setInp(s)} style={{ background: "#fff", border: `1.5px solid ${sel.color}`, borderRadius: 99, padding: "3px 10px", cursor: "pointer", fontFamily: "'Varela Round',sans-serif", fontSize: 11, color: C.dark }}>
              {s}
            </button>
          ))}
        </div>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "12px 14px", display: "flex", flexDirection: "column", gap: 4, maxWidth: 480, width: "100%", margin: "0 auto", boxSizing: "border-box" }}>
        {msgs.map((m, i) => (
          <ChatBubble
            key={i}
            text={m.text}
            name={m.role === "user" ? "אתה" : sel.name}
            avatar={m.role === "user" ? "🧒" : sel.avatar}
            isYou={m.role === "user"}
            color={sel.color}
          />
        ))}
        {loading && (
          <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
            <span style={{ fontSize: 28 }}>{sel.avatar}</span>
            <div style={{ background: "#fff", border: "2px solid #EEE", borderRadius: "20px 20px 20px 4px", padding: "12px 16px", fontFamily: "'Varela Round',sans-serif", fontSize: 15, color: C.soft }}>✍️ כותב...</div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>
      <div style={{ background: "#fff", borderTop: "2px solid #EEE", padding: "8px 12px", flexShrink: 0 }}>
        <div style={{ maxWidth: 480, margin: "0 auto", display: "flex", gap: 7 }}>
          <MicBtn onResult={t => setInp(t)} size={42} label="דבר בקול" />
          <input
            value={inp}
            onChange={e => setInp(e.target.value)}
            onKeyDown={e => e.key === "Enter" && send()}
            placeholder="כתוב הודעה..."
            style={{ flex: 1, border: `2px solid ${sel.color}66`, borderRadius: 12, padding: "10px 12px", fontFamily: "'Varela Round',sans-serif", fontSize: 14, color: C.dark, direction: "rtl" }}
          />
          <button onClick={send} disabled={!inp.trim() || loading}
            style={{ background: sel.color, border: "none", borderRadius: 12, width: 44, height: 44, cursor: "pointer", fontSize: 20, opacity: inp.trim() && !loading ? 1 : 0.4, flexShrink: 0 }}>←</button>
        </div>
      </div>
    </div>
  );
}

const EMOTIONS = [
  { id: "happy",    emoji: "😊", heb: "שמח",    color: C.sun,    bg: C.sunL,    body: "הלב קל וחם!",              cause: "כשקורה משהו טוב",          tip: "שתף את השמחה עם מישהו!" },
  { id: "sad",      emoji: "😢", heb: "עצוב",   color: C.sky,    bg: C.skyL,    body: "עיניים כואבות, כתפיים כבדות", cause: "כשמשהו לא מצליח",          tip: "מותר לבכות! דבר עם מישהו." },
  { id: "angry",    emoji: "😠", heb: "כועס",   color: C.coral,  bg: C.coralL,  body: "פנים חמות, ידיים מהודקות", cause: "כשמישהו פוגע בנו",         tip: "ספור עד 10 ונשום עמוק!" },
  { id: "scared",   emoji: "😨", heb: "פוחד",   color: C.purple, bg: C.purpleL, body: "הלב דופק מהר",              cause: "כשמשהו לא מוכר",           tip: "דבר עם מבוגר שסומכים עליו!" },
  { id: "surprised",emoji: "😮", heb: "מופתע",  color: C.mint,   bg: C.mintL,   body: "פה פתוח, גבות למעלה!",     cause: "כשמשהו בלתי צפוי קורה",    tip: "קח שניה לעכל ואז הגיב!" },
  { id: "excited",  emoji: "🤩", heb: "מתרגש",  color: C.orange, bg: C.orangeL, body: "הכל מהיר, הגוף רוצה לזוז!", cause: "לפני משהו מיוחד",          tip: "ריגוש זה מדהים! שתף אותו!" },
  { id: "lonely",   emoji: "😔", heb: "בודד",   color: C.teal,   bg: C.tealL,   body: "הבטן מרגישה ריקה",          cause: "כשאין חברים סביב",         tip: "גש לאחד ושאל שאלה — זה עוזר!" },
  { id: "proud",    emoji: "🥹", heb: "גאה",    color: C.rose,   bg: C.roseL,   body: "עומד זקוף, הלב מלא",        cause: "כשהצלחנו במשהו קשה",       tip: "חגוג הצלחות — אפילו קטנות!" },
  { id: "calm",     emoji: "😌", heb: "רגוע",   color: C.mintD,  bg: C.mintL,   body: "נשימה איטית, גוף נינוח",    cause: "כשהכל בסדר",               tip: "מצב מעולה לשחק ולהתחבר!" },
];

function EmotionsScreen({ onBack, onEarnStar }) {
  const [mode, setMode] = useState("menu"); // menu | learn | quiz | diary
  const [active, setActive] = useState(EMOTIONS[0]);
  const [quizQ, setQuizQ] = useState(null);
  const [quizCh, setQuizCh] = useState(null);
  const [qCnt, setQCnt] = useState(0);
  const [qSc, setQSc] = useState(0);
  const [qDone, setQDone] = useState(false);
  const [diary, setDiary] = useState([]);
  const [dEm, setDEm] = useState(null);
  const [dNote, setDNote] = useState("");

  const startQuiz = () => {
    setQuizQ(EMOTIONS[Math.floor(Math.random() * EMOTIONS.length)]);
    setQuizCh(null); setQCnt(0); setQSc(0); setQDone(false);
    setMode("quiz");
  };

  const pickQ = (em) => {
    if (quizCh) return;
    setQuizCh(em.id);
    const ok = em.id === quizQ.id;
    if (ok) setQSc(s => s + 1);
    setTimeout(() => {
      const nc = qCnt + 1;
      if (nc >= 8) { setQDone(true); if (qSc + (ok ? 1 : 0) >= 5) onEarnStar(); }
      else { setQCnt(nc); setQuizQ(EMOTIONS[Math.floor(Math.random() * EMOTIONS.length)]); setQuizCh(null); }
    }, 1600);
  };

  if (mode === "learn") return (
    <div style={{ minHeight: "100vh", background: `linear-gradient(160deg,${active.bg} 0%,#FFF8EE 100%)`, direction: "rtl" }}>
      <div style={{ maxWidth: 480, margin: "0 auto", padding: "18px 14px" }}>
        <button onClick={() => setMode("menu")} style={backS}>← חזור</button>
        <h2 style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 22, color: C.dark, marginBottom: 12 }}>😊 למד רגשות</h2>
        <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 6, marginBottom: 16 }}>
          {EMOTIONS.map(em => (
            <button key={em.id} onClick={() => setActive(em)} style={{ background: active.id === em.id ? em.color : em.bg, border: `2px solid ${em.color}`, borderRadius: 99, padding: "8px 12px", cursor: "pointer", fontSize: 20, flexShrink: 0, transition: "all .2s" }}>
              {em.emoji}
            </button>
          ))}
        </div>
        <div style={{ background: "#fff", borderRadius: 24, padding: 22, textAlign: "center", boxShadow: `0 6px 24px ${active.color}44`, marginBottom: 12 }}>
          <div style={{ fontSize: 80 }}>{active.emoji}</div>
          <h3 style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 30, color: active.color, margin: "8px 0 6px" }}>{active.heb}</h3>
          {/* כפתור שמיעה לכל הרגש */}
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 12 }}>
            <SpeakBtn text={`${active.heb}. ${active.body}. ${active.cause}. ${active.tip}`} size={38} />
          </div>
          <div style={{ background: active.bg, borderRadius: 12, padding: "10px 14px", margin: "0 0 10px", fontFamily: "'Varela Round',sans-serif", fontSize: 15, color: C.dark, fontStyle: "italic" }}>
            🫀 {active.body}
          </div>
          <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 14, color: C.mid, lineHeight: 1.7, marginBottom: 8 }}>
            📍 <strong>מתי?</strong> {active.cause}
          </div>
          <div style={{ background: active.bg, borderRadius: 12, padding: "10px 14px", fontFamily: "'Varela Round',sans-serif", fontSize: 14, color: active.color, fontWeight: 700 }}>
            ✨ {active.tip}
          </div>
        </div>
      </div>
    </div>
  );

  if (mode === "quiz" && !qDone) return (
    <div style={{ minHeight: "100vh", background: `linear-gradient(135deg,${quizQ?.bg || C.skyL} 0%,#FFF8EE 100%)`, direction: "rtl" }}>
      <div style={{ maxWidth: 480, margin: "0 auto", padding: "18px 14px" }}>
        <button onClick={() => setMode("menu")} style={backS}>← חזור</button>
        <div style={{ textAlign: "center", marginBottom: 12 }}>
          <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 13, color: C.soft }}>שאלה {qCnt + 1}/8 • נכון: {qSc}</div>
          <div style={{ height: 7, background: "#E8E8E8", borderRadius: 99, overflow: "hidden", margin: "7px 0" }}>
            <div style={{ height: "100%", background: C.mint, borderRadius: 99, width: `${(qCnt / 8) * 100}%`, transition: "width .5s" }} />
          </div>
        </div>
        <div style={{ background: "#fff", borderRadius: 20, padding: 22, textAlign: "center", boxShadow: "0 4px 18px rgba(0,0,0,0.08)", marginBottom: 16 }}>
          <div style={{ fontSize: 80 }}>{quizQ?.emoji}</div>
          {/* כפתור שמיעה על השאלה */}
          <div style={{ display: "flex", justifyContent: "center", margin: "8px 0" }}>
            <SpeakBtn text={`מה הרגש הזה?`} size={32} />
          </div>
          <p style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 16, color: C.mid }}>מה הרגש הזה?</p>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          {EMOTIONS.map(em => {
            const ch = quizCh === em.id;
            const ok = em.id === quizQ?.id;
            return (
              <div key={em.id} style={{ background: ch ? (ok ? "#D4F5E2" : "#FFE5E0") : em.bg, border: `2.5px solid ${ch ? (ok ? C.mint : C.coral) : em.color}`, borderRadius: 14, overflow: "hidden", transition: "all .2s" }}>
                <button onClick={() => pickQ(em)} disabled={!!quizCh}
                  style={{ width: "100%", background: "transparent", border: "none", padding: "12px 8px", cursor: quizCh ? "default" : "pointer", fontFamily: "'Varela Round',sans-serif", fontSize: 15, color: C.dark, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                  <span style={{ fontSize: 26 }}>{em.emoji}</span>
                  <span>{em.heb}</span>
                </button>
                {/* כפתור שמיעה לכל תשובה */}
                <div style={{ borderTop: `1px solid ${em.color}44`, background: "#F8F8FF", padding: "5px", display: "flex", justifyContent: "center" }}>
                  <SpeakBtn text={em.heb} size={26} />
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );

  if (mode === "quiz" && qDone) return (
    <div style={{ minHeight: "100vh", background: "#FFF8EE", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", direction: "rtl", padding: 20 }}>
      <div style={{ fontSize: 76 }}>{qSc >= 6 ? "🌟" : qSc >= 4 ? "😊" : "💪"}</div>
      <h2 style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 24, color: C.dark }}>{qSc >= 6 ? "מומחה רגשות!" : qSc >= 4 ? "כל הכבוד!" : "ניסיון טוב!"}</h2>
      <p style={{ fontFamily: "'Varela Round',sans-serif", color: C.mid, fontSize: 17 }}>{qSc}/8 נכון!</p>
      {qSc >= 5 && <p style={{ color: C.mint, fontSize: 15, fontFamily: "'Varela Round',sans-serif" }}>⭐ קיבלת כוכב!</p>}
      <button onClick={startQuiz} style={btnS(C.sun)}>שחק שוב</button>
      <button onClick={() => setMode("menu")} style={{ ...btnS(C.sky), marginTop: 8 }}>חזור</button>
    </div>
  );

  if (mode === "diary") return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(135deg,#EDE0FF 0%,#FFF8EE 100%)", direction: "rtl" }}>
      <div style={{ maxWidth: 480, margin: "0 auto", padding: "18px 14px" }}>
        <button onClick={() => setMode("menu")} style={backS}>← חזור</button>
        <h2 style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 22, color: C.dark, marginBottom: 12 }}>📓 יומן הרגשות שלי</h2>
        <div style={{ background: "#fff", border: `2px solid ${C.purple}44`, borderRadius: 16, padding: 16, marginBottom: 16 }}>
          <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 14, fontWeight: 700, color: C.dark, marginBottom: 9 }}>איך אתה מרגיש עכשיו?</div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
            {EMOTIONS.map(em => (
              <button key={em.id} onClick={() => setDEm(dEm?.id === em.id ? null : em)}
                style={{ background: dEm?.id === em.id ? em.color : em.bg, border: `2px solid ${em.color}`, borderRadius: 99, padding: "7px 10px", cursor: "pointer", fontSize: 20, transition: "all .2s" }}>
                {em.emoji}
              </button>
            ))}
          </div>
          {dEm && (
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 8 }}>
              <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 13, color: dEm.color }}>בחרת: {dEm.heb} {dEm.emoji}</div>
              <SpeakBtn text={`${dEm.heb}. ${dEm.tip}`} size={26} />
            </div>
          )}
          <div style={{ display: "flex", gap: 7, marginBottom: 9 }}>
            <textarea value={dNote} onChange={e => setDNote(e.target.value)} placeholder="כתוב מה קרה (לא חובה)..."
              style={{ flex: 1, border: `2px solid ${C.purple}44`, borderRadius: 12, padding: "9px 12px", fontFamily: "'Varela Round',sans-serif", fontSize: 13, color: C.dark, resize: "vertical", minHeight: 60, direction: "rtl", boxSizing: "border-box" }} />
            <MicBtn onResult={t => setDNote(t)} size={42} label="הקלט הרגשה" />
          </div>
          <button onClick={() => { if (!dEm) return; setDiary(d => [{ emotion: dEm, note: dNote, time: new Date().toLocaleTimeString("he-IL", { hour: "2-digit", minute: "2-digit" }) }, ...d]); setDEm(null); setDNote(""); }}
            disabled={!dEm}
            style={{ ...btnS(C.purple), opacity: dEm ? 1 : 0.5 }}>+ הוסף לרשימה</button>
        </div>
        {diary.length === 0 && <div style={{ textAlign: "center", fontFamily: "'Varela Round',sans-serif", fontSize: 13, color: C.soft, padding: 20 }}>עדיין לא הוספת רגשות 🌈</div>}
        {diary.map((d, i) => (
          <div key={i} style={{ background: d.emotion.bg, border: `2px solid ${d.emotion.color}`, borderRadius: 14, padding: "10px 12px", display: "flex", gap: 9, alignItems: "flex-start", marginBottom: 9 }}>
            <span style={{ fontSize: 28 }}>{d.emotion.emoji}</span>
            <div style={{ flex: 1 }}>
              <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 14, fontWeight: 700, color: d.emotion.color }}>{d.emotion.heb}</div>
              {d.note && <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 12, color: C.mid, marginTop: 2 }}>{d.note}</div>}
              <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 10, color: C.soft, marginTop: 2 }}>🕐 {d.time}</div>
            </div>
            <SpeakBtn text={`${d.emotion.heb}. ${d.note || ""}`} size={26} />
          </div>
        ))}
      </div>
    </div>
  );

  // תפריט
  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(135deg,#FFF5D0 0%,#FFF8EE 100%)", direction: "rtl" }}>
      <div style={{ maxWidth: 480, margin: "0 auto", padding: "18px 14px" }}>
        <button onClick={onBack} style={backS}>← חזור</button>
        <h2 style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 24, color: C.dark, marginBottom: 12 }}>😊 עולם הרגשות</h2>
        <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 6, marginBottom: 18 }}>
          {EMOTIONS.map(em => (
            <div key={em.id} style={{ background: em.bg, border: `2px solid ${em.color}`, borderRadius: 12, padding: "8px 12px", flexShrink: 0, textAlign: "center" }}>
              <div style={{ fontSize: 24 }}>{em.emoji}</div>
              <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 10, color: em.color, marginTop: 2 }}>{em.heb}</div>
              <SpeakBtn text={`${em.heb}. ${em.tip}`} size={22} />
            </div>
          ))}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          {[
            { id: "learn",  icon: "📖", label: "למד רגשות", desc: "הכר כל רגש לעומק", color: C.sun,    bg: C.sunL },
            { id: "quiz",   icon: "🎯", label: "חידון",      desc: "זהה רגש מאימוג'י", color: C.coral,  bg: C.coralL, action: startQuiz },
            { id: "diary",  icon: "📓", label: "יומן + 🎙️", desc: "רשום ב-קול",       color: C.purple, bg: C.purpleL },
          ].map(it => (
            <div key={it.id} onClick={it.action || (() => setMode(it.id))} style={{ background: it.bg, border: `3px solid ${it.color}`, borderRadius: 20, padding: "16px 12px", cursor: "pointer", textAlign: "center", boxShadow: `0 2px 8px ${it.color}33`, transition: "all .2s" }}>
              <div style={{ fontSize: 34, marginBottom: 5 }}>{it.icon}</div>
              <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 16, fontWeight: 700, color: C.dark }}>{it.label}</div>
              <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 11, color: C.soft, marginTop: 2 }}>{it.desc}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

  background: color, border: "none", borderRadius: 16, padding: "13px 20px",
  fontFamily: "'Varela Round',sans-serif", fontSize: 15, fontWeight: 700, color: "#fff",
  cursor: "pointer", width: "100%", boxShadow: `0 4px 14px ${color}55`,
  transition: "all .2s", marginTop: 8, ...extra,
});
const backS = {
  background: "transparent", border: "2px solid #DDD", borderRadius: 12,
  padding: "7px 16px", fontFamily: "'Varela Round',sans-serif", fontSize: 13,
  color: C.mid, cursor: "pointer", marginBottom: 14, display: "inline-block",
};

const CATS = [
  { id: "all",          l: "הכל",         icon: "🌈", c: C.sky    },
  { id: "להתחיל שיחה", l: "פתיחת שיחה",  icon: "💬", c: C.sky    },

  { id: "ארוחת צהריים", l: "ארוחה",       icon: "🍱", c: C.mint   },
  { id: "בכיתה",        l: "בכיתה",       icon: "📚", c: C.rose   },
  { id: "רגשות",        l: "רגשות",       icon: "💙", c: C.purple },
];
const DIFF_L = ["", "קל", "בינוני", "מאתגר"];
const DIFF_C = ["", C.mint, C.sun, C.coral];

function ScenariosScreen({ onBack, onEarnStar, doneIds }) {
  const [cat, setCat] = useState("all");
  const [playing, setPlaying] = useState(null);

  if (playing) return (
    <ScenarioPlayer
      sc={playing}
      onBack={() => setPlaying(null)}
      onWin={() => onEarnStar(playing.id)}
    />
  );

  const list = cat === "all" ? SCENARIOS : SCENARIOS.filter(s => s.category === cat);

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(135deg,#E3F4FF 0%,#FFF8EE 100%)", direction: "rtl" }}>
      <div style={{ maxWidth: 480, margin: "0 auto", padding: "18px 14px" }}>
        <button onClick={onBack} style={backS}>← חזור</button>
        <h2 style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 24, color: C.dark, marginBottom: 4 }}>💬 תרגול שיחות</h2>
        <p style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 13, color: C.mid, marginBottom: 12 }}>

function FloatingChatBot({ onClose }) {
  const [msgs, setMsgs] = useState([
    { role: "assistant", text: "היי! אני קלי, העוזר/ת החברתי/ת שלך 🌈\nאני יכול/ה לעזור לך עם:\n• עצות לסיטואציות חברתיות\n• הסבר על רגשות\n• לעבד יחד אירועים מהיום\n\nעל מה תרצה לדבר?" }
  ]);
  const [inp, setInp] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs]);

  const send = async () => {
    if (!inp.trim() || loading) return;
    const um = { role: "user", text: inp.trim() };
    const nm = [...msgs, um];
    setMsgs(nm); setInp(""); setLoading(true);

    try {
      const r = await fetch("https://keshet-ai-proxy.asisi27.workers.dev", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 1024,
          system: "אתה קלי, יועץ ידידותי וחם לילדים על הספקטרום האוטיסטי. ענה תמיד בעברית פשוטה וברורה. תן עצות מעשיות וקצרות. הבע אכפתיות. אל תשפוט. תמיד עודד ניסיון ולמידה. כשהילד מתאר מצב חברתי — תן 2-3 רעיונות ספציפיים מה לעשות. אם נראה שמדובר במצוקה אמיתית — תזכיר לפנות להורה או מבוגר. לא יותר מ-4 משפטים בתגובה.",
          messages: nm.map(m => ({ role: m.role === "user" ? "user" : "assistant", content: m.text })),
        }),
      });
      const d = await r.json();
      const reply = d.content?.[0]?.text || "סליחה, משהו השתבש. נסה שוב 😊";
      setMsgs(m => [...m, { role: "assistant", text: reply }]);
    } catch {
      setMsgs(m => [...m, { role: "assistant", text: "אוי, יש בעיה בחיבור. בדוק אינטרנט ונסה שוב 💙" }]);
    }
    setLoading(false);
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.65)", zIndex: 5000, display: "flex", alignItems: "flex-end", justifyContent: "center", direction: "rtl" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: "#fff", borderRadius: "28px 28px 0 0", width: "100%", maxWidth: 480, height: "85vh", display: "flex", flexDirection: "column" }}>
        {/* Header */}
        <div style={{ background: `linear-gradient(135deg, ${C.purple}, ${C.sky})`, padding: "14px 18px", borderRadius: "28px 28px 0 0", display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 44, height: 44, borderRadius: "50%", background: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24 }}>🌈</div>
          <div style={{ flex: 1, color: "#fff" }}>
            <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 16, fontWeight: 700 }}>קלי - עוזר חברתי</div>
            <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 11, opacity: 0.9 }}>● זמין/ה לעזור</div>
          </div>
          <button onClick={onClose} style={{ background: "rgba(255,255,255,0.25)", border: "none", borderRadius: "50%", width: 34, height: 34, cursor: "pointer", fontSize: 18, color: "#fff" }}>✕</button>
        </div>

        {/* Messages */}
        <div style={{ flex: 1, overflowY: "auto", padding: "14px", display: "flex", flexDirection: "column", gap: 10 }}>
          {msgs.map((m, i) => {
            const isU = m.role === "user";
            return (
              <div key={i} style={{ display: "flex", gap: 8, alignItems: "flex-end", flexDirection: isU ? "row-reverse" : "row" }}>
                <span style={{ fontSize: 28, flexShrink: 0 }}>{isU ? "🧒" : "🌈"}</span>
                <div style={{ display: "flex", flexDirection: "column", alignItems: isU ? "flex-end" : "flex-start", maxWidth: "75%" }}>
                  <div style={{
                    background: isU ? C.purple : "#F0F0FF",
                    border: `2px solid ${isU ? C.purple : "#DDD0FF"}`,
                    borderRadius: isU ? "18px 18px 4px 18px" : "18px 18px 18px 4px",
                    padding: "10px 14px",
                    fontFamily: "'Varela Round',sans-serif",
                    fontSize: 14,
                    color: isU ? "#fff" : C.dark,
                    lineHeight: 1.6,
                    whiteSpace: "pre-line",
                  }}>
                    {m.text}
                  </div>
                  {!isU && <div style={{ marginTop: 4 }}><SpeakBtn text={m.text} size={26} /></div>}
                </div>
              </div>
            );
          })}
          {loading && (
            <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
              <span style={{ fontSize: 28 }}>🌈</span>
              <div style={{ background: "#F0F0FF", border: "2px solid #DDD0FF", borderRadius: "18px 18px 18px 4px", padding: "10px 14px", fontFamily: "'Varela Round',sans-serif", fontSize: 14, color: C.soft }}>
                ✍️ חושב...
              </div>
            </div>
          )}
          <div ref={bottomRef} />
        </div>

        {/* Quick suggestions */}
        <div style={{ padding: "8px 14px", borderTop: "2px solid #EEE", display: "flex", gap: 6, flexWrap: "wrap" }}>
          {["איך אני מתחיל שיחה?", "פחדתי לדבר היום", "מישהו צחק עליי", "איך לעזור לחבר עצוב?"].map(q => (
            <button key={q} onClick={() => setInp(q)}
              style={{ background: "#fff", border: `1.5px solid ${C.purple}`, borderRadius: 99, padding: "4px 10px", cursor: "pointer", fontFamily: "'Varela Round',sans-serif", fontSize: 11, color: C.purple }}>
              {q}
            </button>
          ))}
        </div>

        {/* Input */}
        <div style={{ padding: "10px 14px", borderTop: "2px solid #EEE", display: "flex", gap: 7 }}>
          <MicBtn onResult={t => setInp(t)} size={42} />
          <input value={inp} onChange={e => setInp(e.target.value)} onKeyDown={e => e.key === "Enter" && send()}
            placeholder="כתוב הודעה..."
            style={{ flex: 1, border: `2px solid ${C.purple}66`, borderRadius: 12, padding: "10px 12px", fontFamily: "'Varela Round',sans-serif", fontSize: 14, color: C.dark, direction: "rtl" }}/>
          <button onClick={send} disabled={!inp.trim() || loading}
            style={{ background: C.purple, border: "none", borderRadius: 12, width: 44, height: 44, cursor: "pointer", fontSize: 20, color: "#fff", opacity: inp.trim() && !loading ? 1 : 0.4 }}>←</button>
        </div>
      </div>
    </div>
  );
}

const DEFAULT_A11Y = {
  fontSize: 16,
  contrast: "normal",
  voiceType: "child",
  voiceRate: 1,
  voicePitch: 1.5,
  autoRead: false,
  noAnim: false,
  bigButtons: false,
  dyslexiaFont: false,
  lineSpacing: false,
  highlightFocus: false,
  soundEffects: true,
};

function App() {
  const [screen, setScreen] = useState("home");
  const [stars, setStars] = useState(() => { try { return parseInt(localStorage.getItem(LS.s) || "0"); } catch { return 0; } });
  const [doneIds, setDoneIds] = useState(() => { try { return new Set(JSON.parse(localStorage.getItem(LS.d) || "[]")); } catch { return new Set(); } });
  const [burst, setBurst] = useState(false);
  const [legalAccepted, setLegalAccepted] = useState(() => {
    try { return localStorage.getItem("kq_legal") === "1"; } catch { return false; }
  });
  const [permsReady, setPermsReady] = useState(() => {
    try { return localStorage.getItem("kq_perms") === "1"; } catch { return false; }
  });
  const [showA11y, setShowA11y] = useState(false);
  const [showBot, setShowBot] = useState(false);
  const [a11y, setA11y] = useState(() => {
    try { return { ...DEFAULT_A11Y, ...JSON.parse(localStorage.getItem("kq_a11y") || "{}") }; } catch { return DEFAULT_A11Y; }
  });

  // טעינת קולות בכניסה
  useEffect(() => { loadVoices(); }, []);

  // עדכון קול כש-a11y משתנה
  useEffect(() => { currentVoiceType = a11y.voiceType; }, [a11y.voiceType]);

  const updateA11y = (key, val) => {
    if (key === "__reset") {
      setA11y(DEFAULT_A11Y);
      try { localStorage.setItem("kq_a11y", JSON.stringify(DEFAULT_A11Y)); } catch {}
      return;
    }
    setA11y(p => {
      const n = { ...p, [key]: val };
      try { localStorage.setItem("kq_a11y", JSON.stringify(n)); } catch {}
      return n;
    });
  };

  const earn = (scId) => {
    setStars(s => { const n = s + 1; try { localStorage.setItem(LS.s, String(n)); } catch {} return n; });
    if (scId) setDoneIds(p => { const next = new Set(p); next.add(scId); try { localStorage.setItem(LS.d, JSON.stringify([...next])); } catch {} return next; });
    setBurst(true); setTimeout(() => setBurst(false), 1200);
  };

  const handleReady = () => {
    try { localStorage.setItem("kq_perms", "1"); } catch {}
    setPermsReady(true);
  };

  // יישום הגדרות נגישות גלובלית
  const a11yStyle = {
    fontSize: a11y.fontSize,
    fontFamily: a11y.dyslexiaFont ? "'Arial', sans-serif" : "'Varela Round', sans-serif",
    lineHeight: a11y.lineSpacing ? 2 : undefined,
    filter: a11y.contrast === "high" ? "contrast(1.3)" : a11y.contrast === "dark" ? "invert(0.92) hue-rotate(180deg)" : undefined,
  };

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Varela+Round&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Varela Round', sans-serif; background: #FFF8EE; overflow-x: hidden; }
        input, textarea { outline: none; }
        button:active { transform: scale(.97) !important; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #4FB3F655; border-radius: 99px; }
        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
      `}</style>

      {/* כוכב אנימציה */}
      {burst && (
        <div style={{ position: "fixed", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none", zIndex: 9999 }}>
          <div style={{ fontSize: 110, animation: "fadeIn .3s ease" }}>⭐</div>
        </div>
      )}

      {!legalAccepted && <ConsentScreen onAccept={() => {
        try { localStorage.setItem("kq_legal", "1"); } catch {}
        setLegalAccepted(true);
      }} />}
      
      {legalAccepted && !permsReady && <PermissionsScreen onReady={handleReady} />}
      
      {legalAccepted && permsReady && (
        <div style={a11yStyle}>
          {screen === "home"         && <HomeScreen onNavigate={setScreen} stars={stars} doneIds={doneIds} />}
          {screen === "scenarios"    && <ScenariosScreen onBack={() => setScreen("home")} onEarnStar={earn} doneIds={doneIds} />}
          {screen === "aichat"       && <AIChatScreen onBack={() => setScreen("home")} onEarnStar={() => earn(null)} />}
          {screen === "emotions"     && <EmotionsScreen onBack={() => setScreen("home")} onEarnStar={() => earn(null)} />}
          {screen === "achievements" && <AchievementsScreen onBack={() => setScreen("home")} stars={stars} doneIds={doneIds} />}
          {screen === "about"        && <AboutScreen onBack={() => setScreen("home")} />}

          {/* כפתורי נגישות וצ'אט בוט צפים */}
          <div style={{ position: "fixed", bottom: 90, left: 14, display: "flex", flexDirection: "column", gap: 10, zIndex: 100 }}>
            {/* Accessibility */}
            <button onClick={() => setShowA11y(true)} title="הגדרות נגישות"
              style={{
                background: `linear-gradient(135deg, ${C.purple}, ${C.sky})`,
                border: "3px solid #fff",
                borderRadius: "50%",
                width: 56, height: 56,
                cursor: "pointer",
                fontSize: 26,
                color: "#fff",
                boxShadow: `0 6px 20px ${C.purple}88, 0 0 0 2px ${C.purple}44`,
                display: "flex", alignItems: "center", justifyContent: "center",
                transition: "all .2s",
                animation: "pulse 3s ease infinite",
              }}>
              ♿
            </button>
            
            {/* Chatbot */}
            <button onClick={() => setShowBot(true)} title="עוזר חברתי - קלי"
              style={{
                background: `linear-gradient(135deg, ${C.coral}, ${C.sun})`,
                border: "3px solid #fff",
                borderRadius: "50%",
                width: 56, height: 56,
                cursor: "pointer",
                fontSize: 26,
                color: "#fff",
                boxShadow: `0 6px 20px ${C.coral}88, 0 0 0 2px ${C.coral}44`,
                display: "flex", alignItems: "center", justifyContent: "center",
                transition: "all .2s",
                position: "relative",
              }}>
              💬
              <span style={{
                position: "absolute",
                top: -4, right: -4,
                background: C.mint, color: "#fff",
                borderRadius: "50%",
                width: 20, height: 20,
                fontSize: 12,
                display: "flex", alignItems: "center", justifyContent: "center",
                border: "2px solid #fff",
                fontFamily: "'Varela Round',sans-serif",
                fontWeight: 700,
              }}>!</span>
            </button>
          </div>

          {showA11y && <AccessibilityPanel a11y={a11y} onChange={updateA11y} onClose={() => setShowA11y(false)} />}
          {showBot && <FloatingChatBot onClose={() => setShowBot(false)} />}
        </div>
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));

window.addEventListener('load', () => {
  setTimeout(() => {
    const s = document.getElementById('splash');
    if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 500); }
  }, 600);
});
  </script>
</body>
</html>
