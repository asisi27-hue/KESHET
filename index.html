const { useState, useEffect, useRef } = React;

/* ── COLORS ── */
const C = {
  sky:"#4FB3F6", skyL:"#DEF0FF",
  mint:"#2ECC8E", mintL:"#D5F7EB", mintD:"#1A8A5E",
  sun:"#FFB020", sunL:"#FFF0C0", sunD:"#CC7A00",
  coral:"#FF5757", coralL:"#FFE0E0",
  purple:"#9B6FE8", purpleL:"#EDE0FF",
  rose:"#F06292", roseL:"#FFE0EE",
  teal:"#26C6DA", tealL:"#E0FAFE",

/* ══════════════════════════════════════════
   TTS — לחיצה על 🔊 מקריאה את הטקסט
══════════════════════════════════════════ */
// סוגי קול
const VOICE_TYPES = {
  child:  { rate: 1.15, pitch: 1.9, label: "קול ילד 👦"  },
  adult:  { rate: 0.9,  pitch: 1.0, label: "קול מבוגר 👨" },
  slow:   { rate: 0.65, pitch: 1.4, label: "איטי 🐢"      },
};

let currentVoiceType = "child";
let availableVoices = [];
let ttsSupported = null; // null = unknown, true/false = tested

// בדיקת פלטפורמה
const IS_ANDROID = /Android/i.test(navigator.userAgent);
const IS_IOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

function loadVoices() {
  return new Promise((resolve) => {
    if (!window.speechSynthesis) { resolve([]); return; }
    let voices = window.speechSynthesis.getVoices();
    if (voices.length > 0) { availableVoices = voices; resolve(voices); return; }
    
    // אנדרואיד טוען קולות באיחור
    let resolved = false;
    const finish = (vs) => { if (!resolved) { resolved = true; availableVoices = vs; resolve(vs); } };
    
    window.speechSynthesis.onvoiceschanged = () => {
      const vs = window.speechSynthesis.getVoices();
      if (vs.length > 0) finish(vs);
    };
    
    // נסה כמה פעמים — אנדרואיד לפעמים זקוק לזה
    let attempts = 0;
    const tryAgain = () => {
      attempts++;
      const vs = window.speechSynthesis?.getVoices() || [];
      if (vs.length > 0) finish(vs);
      else if (attempts < 10) setTimeout(tryAgain, 300);
      else finish([]);
    };
    setTimeout(tryAgain, 100);
  });
}

function readAloud(text, type) {
  if (!text) return false;
  if (!window.speechSynthesis) {
    alert("⚠️ הדפדפן לא תומך בקריאה בקול.\n\nנסה לפתוח באמצעות Google Chrome.");
    return false;
  }
  try {
    // Edge דורש שזה יקרה אחרי user gesture — קודם resume
    if (window.speechSynthesis.paused) window.speechSynthesis.resume();
    window.speechSynthesis.cancel();
    
    // עדכן רשימת קולות אם ריקה
    if (availableVoices.length === 0) {
      availableVoices = window.speechSynthesis.getVoices() || [];
    }
    
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(text);
      const v = VOICE_TYPES[type || currentVoiceType] || VOICE_TYPES.child;
      u.rate = v.rate;
      u.pitch = v.pitch;
      u.volume = 1;
      
      const voices = availableVoices.length ? availableVoices : (window.speechSynthesis.getVoices() || []);
      
      // חיפוש מדורג של קול מתאים
      const heVoice = voices.find(v => v.lang === "he-IL") || voices.find(v => v.lang?.startsWith("he"));
      const arVoice = voices.find(v => v.lang?.startsWith("ar"));
      const enVoice = voices.find(v => v.lang?.startsWith("en"));
      
      const voice = heVoice || arVoice || enVoice || voices[0];
      
      if (voice) {
        u.voice = voice;
        // קבע lang לפי הקול שנבחר — חשוב ל-Edge!
        u.lang = voice.lang;
      } else {
        u.lang = "he-IL";
      }
      
      u.onerror = (ev) => {
        console.warn("TTS error:", ev);
        if (ev.error === "not-allowed") {
          alert("🔇 הקול חסום. בדוק עוצמת קול במכשיר.");
        } else if (ev.error === "synthesis-failed" || ev.error === "synthesis-unavailable") {
          alert("⚠️ הדפדפן שלך לא הצליח לסנתז קול.\n\nב-Edge: התקן חבילת קול עברית בהגדרות Windows → Time & Language → Speech → Add voices.\n\nאו פתח את האפליקציה ב-Chrome.");
        } else if (ev.error === "language-unavailable" || ev.error === "voice-unavailable") {
          // נסה שוב באנגלית כ-fallback
          const fallback = new SpeechSynthesisUtterance(text);
          fallback.lang = "en-US";
          fallback.rate = v.rate; fallback.pitch = v.pitch;
          if (enVoice) fallback.voice = enVoice;
          window.speechSynthesis.speak(fallback);
        }
      };
      
      window.speechSynthesis.speak(u);
    }, 100);
    
    return true;
  } catch (e) {
    console.warn("TTS error:", e);
    alert("❌ שגיאה בהפעלת הקול: " + e.message);
    return false;
  }
}

function PermissionsScreen({ onReady }) {
  const [status, setStatus] = useState({ tts: null, mic: null });
  const [testing, setTesting] = useState(false);
  const [voiceList, setVoiceList] = useState([]);
  const [showHelp, setShowHelp] = useState(false);
  const [diagnostics, setDiagnostics] = useState([]);
  const [showDiag, setShowDiag] = useState(false);

  const log = (msg) => setDiagnostics(d => [...d, `${new Date().toLocaleTimeString()}: ${msg}`]);

  useEffect(() => {
    log(`User Agent: ${navigator.userAgent.slice(0, 60)}...`);
    log(`speechSynthesis: ${!!window.speechSynthesis ? "✅ קיים" : "❌ לא קיים"}`);
    log(`SpeechRecognition: ${!!(window.SpeechRecognition || window.webkitSpeechRecognition) ? "✅ קיים" : "❌ לא קיים"}`);
    log(`HTTPS: ${location.protocol === "https:" ? "✅ כן" : "⚠️ לא — נדרש HTTPS!"}`);
    
    loadVoices().then(vs => {
      setVoiceList(vs);
      log(`נמצאו ${vs.length} קולות`);
      const heb = vs.filter(v => v.lang?.startsWith("he"));
      log(`קולות עברית: ${heb.length > 0 ? heb.map(v => v.name).join(", ") : "❌ אין"}`);
    });
  }, []);

  const testTTS = async () => {
    setTesting(true);
    log("🔊 מתחיל בדיקת קול...");
    
    if (!window.speechSynthesis) { 
      log("❌ speechSynthesis לא נתמך");
      setStatus(s => ({ ...s, tts: "fail" })); 
      setTesting(false); 
      return; 
    }
    
    const voices = await loadVoices();
    setVoiceList(voices);
    log(`טען ${voices.length} קולות`);
    
    if (voices.length === 0) {
      log("❌ אין קולות זמינים במכשיר");
      setStatus(s => ({ ...s, tts: "fail" })); 
      setTesting(false); 
      alert("❌ אין קולות מותקנים במכשיר.\n\nאנדרואיד: התקן 'Speech Services by Google' מ-Play Store");
      return;
    }
    
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance("שלום! זאת בדיקת קול. האם אתה שומע אותי?");
      u.lang = "he-IL";
      u.rate = 1.0;
      u.pitch = 1.3;
      u.volume = 1;
      
      const voice = voices.find(v => v.lang === "he-IL")
                 || voices.find(v => v.lang?.startsWith("he"))
                 || voices.find(v => v.lang?.startsWith("ar"))
                 || voices.find(v => v.lang?.startsWith("en"))
                 || voices[0];
      if (voice) { u.voice = voice; log(`משתמש בקול: ${voice.name} (${voice.lang})`); }
      else log("⚠️ לא נבחר קול");
      
      u.onstart = () => log("▶️ הקול התחיל לדבר");
      u.onend = () => { log("✅ הקול סיים"); setStatus(s => ({ ...s, tts: "ok" })); setTesting(false); };
      u.onerror = (ev) => { 
        log(`❌ שגיאת TTS: ${ev.error}`);
        setStatus(s => ({ ...s, tts: "fail" })); 
        setTesting(false); 
        if (ev.error === "not-allowed") alert("🔇 הצליל חסום בדפדפן.\nבדוק שעוצמת הקול במכשיר לא במצב שקט.");
      };
      
      log("🎯 קורא ל-speak()...");
      window.speechSynthesis.speak(u);
      
      setTimeout(() => { 
        if (status.tts === null) { 
          log("⏰ Timeout - מסמן כ-OK בכל מקרה"); 
          setStatus(s => s.tts === null ? { ...s, tts: "ok" } : s); 
          setTesting(false); 
        }
      }, 6000);
    } catch (e) { 
      log(`❌ Exception: ${e.message}`);
      setStatus(s => ({ ...s, tts: "fail" })); 
      setTesting(false); 
    }
  };

  const testMic = async () => {
    log("🎙️ מתחיל בדיקת מיקרופון...");
    if (!navigator.mediaDevices?.getUserMedia) { 
      log("❌ getUserMedia לא נתמך");
      setStatus(s => ({ ...s, mic: "fail" })); 
      alert("⚠️ הדפדפן לא תומך במיקרופון. נסה Chrome.");
      return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      stream.getTracks().forEach(t => t.stop());
      log("✅ הרשאת מיקרופון ניתנה");
      setStatus(s => ({ ...s, mic: "ok" }));
    } catch (e) { 
      log(`❌ ${e.name}: ${e.message}`);
      setStatus(s => ({ ...s, mic: "fail" })); 
      alert(`❌ ${e.message}\n\nאנדרואיד: הגדרות > אפליקציות > Chrome > הרשאות > מיקרופון`);
    }
  };

  const hasHebrewVoice = voiceList.some(v => v.lang?.startsWith("he"));

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(160deg,#E8F4FF 0%,#FFF0F8 50%,#F0FFE8 100%)", direction: "rtl", display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
      <div style={{ background: "#fff", borderRadius: 24, padding: 22, maxWidth: 420, width: "100%", boxShadow: "0 10px 40px rgba(0,0,0,0.1)", textAlign: "center" }}>
        <div style={{ fontSize: 50 }}>🌈</div>
        <h1 style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 22, color: C.purple, margin: "6px 0 4px" }}>קשת חברים</h1>
        <p style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 12, color: C.mid, marginBottom: 14 }}>
          בואו נבדוק שהקול עובד 🔊
        </p>

        {/* מצב קולות */}
        <div style={{ background: voiceList.length > 0 ? C.mintL : C.coralL, border: `2px solid ${voiceList.length > 0 ? C.mint : C.coral}`, borderRadius: 12, padding: "10px 12px", marginBottom: 10, fontFamily: "'Varela Round',sans-serif", fontSize: 12, color: C.dark, textAlign: "right" }}>
          {voiceList.length > 0 ? (
            <>✅ מצאנו <strong>{voiceList.length}</strong> קולות במכשיר{hasHebrewVoice && " — כולל עברית! 🇮🇱"}</>
          ) : (
            <>⚠️ <strong>אין קולות במכשיר</strong> — לחץ "בדוק" לרענון</>
          )}
        </div>

        {/* TTS Button */}
        <button onClick={testTTS} disabled={testing}
          style={{ background: status.tts === "ok" ? C.mint : C.sun, border: "none", borderRadius: 14, padding: "14px 16px", fontFamily: "'Varela Round',sans-serif", fontSize: 15, fontWeight: 700, color: "#fff", cursor: "pointer", width: "100%", marginBottom: 10, boxShadow: `0 4px 14px ${status.tts === "ok" ? C.mint : C.sun}55` }}>
          {testing ? "⏳ בודק קול..." : status.tts === "ok" ? "✅ הקול עובד! לחץ לבדיקה נוספת" : "🔊 לחץ ושמע 'שלום!'"}
        </button>

        {/* Mic Button */}
        <button onClick={testMic}
          style={{ background: status.mic === "ok" ? C.mint : C.purple, border: "none", borderRadius: 14, padding: "12px 16px", fontFamily: "'Varela Round',sans-serif", fontSize: 14, fontWeight: 700, color: "#fff", cursor: "pointer", width: "100%", marginBottom: 12, boxShadow: `0 4px 14px ${status.mic === "ok" ? C.mint : C.purple}55` }}>
          {status.mic === "ok" ? "✅ מיקרופון מוכן" : "🎙️ אשר מיקרופון"}
        </button>

        {/* כפתור אבחון */}
        <button onClick={() => setShowDiag(!showDiag)} style={{ background: "transparent", border: `1.5px solid ${C.coral}`, borderRadius: 10, padding: "6px 10px", fontFamily: "'Varela Round',sans-serif", fontSize: 11, color: C.coral, cursor: "pointer", marginBottom: 8, width: "100%" }}>
          {showDiag ? "▲ הסתר אבחון" : "🔍 הצג מידע אבחון (אם לא עובד)"}
        </button>

        {showDiag && (
          <div style={{ background: "#1A1630", borderRadius: 10, padding: "10px 12px", marginBottom: 10, fontFamily: "monospace", fontSize: 10, color: "#7EDBA4", textAlign: "left", direction: "ltr", maxHeight: 180, overflowY: "auto", lineHeight: 1.5 }}>
            {diagnostics.map((d, i) => <div key={i}>{d}</div>)}
          </div>
        )}

        <button onClick={() => setShowHelp(!showHelp)} style={{ background: "transparent", border: `1.5px solid ${C.purple}`, borderRadius: 10, padding: "6px 10px", fontFamily: "'Varela Round',sans-serif", fontSize: 11, color: C.purple, cursor: "pointer", marginBottom: 8, width: "100%" }}>
          {showHelp ? "▲" : "▼"} הוראות לאנדרואיד
        </button>

        {showHelp && (
          <div style={{ background: "#FFF3CD", borderRadius: 10, padding: "10px 12px", marginBottom: 10, fontFamily: "'Varela Round',sans-serif", fontSize: 11, color: C.dark, textAlign: "right", lineHeight: 1.7 }}>
            <strong>אם אין צליל באנדרואיד:</strong><br/>
            1. <strong>בדוק עוצמת קול</strong> במכשיר — לא במצב שקט<br/>
            2. <strong>פתח Play Store</strong> והתקן:<br/>
            &nbsp;&nbsp;<em>"Speech Services by Google"</em><br/>
            3. <strong>הגדרות מערכת:</strong><br/>
            &nbsp;&nbsp;ניהול כללי → שפה → טקסט-לדיבור<br/>
            &nbsp;&nbsp;→ בחר "Speech Services by Google"<br/>
            4. <strong>התקן עברית:</strong> 🔧 → התקן נתוני קול → עברית<br/>
            5. <strong>סגור ופתח את הדפדפן מחדש</strong>
          </div>
        )}

        <button onClick={onReady} style={{ ...btnS(C.purple), marginTop: 0 }}>
          {(status.tts === "ok" || status.mic === "ok") ? "✅ נתחיל!" : "המשך בכל מקרה →"}
        </button>
      </div>
    </div>
  );
}

// בורר קול ש-SpeakBtn ישתמש בו
function VoiceTypeSelector() {
  const [vt, setVt] = useState(currentVoiceType);
  return (
    <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
      <span style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 12, color: C.mid }}>סוג קול:</span>
      {Object.entries(VOICE_TYPES).map(([k, v]) => (
        <button key={k} onClick={() => { currentVoiceType = k; setVt(k); }}
          style={{
            background: vt === k ? C.purple : C.purpleL,
            border: `2px solid ${C.purple}`,
            borderRadius: 99, padding: "4px 10px",
            cursor: "pointer",
            fontFamily: "'Varela Round',sans-serif",
            fontSize: 12,
            color: vt === k ? "#fff" : C.purple,
            transition: "all .2s",
          }}>
          {v.label}
        </button>
      ))}
    </div>
  );
}

/* כפתור רמקול — לוחצים ושומעים את הטקסט */
function SpeakBtn({ text, size = 36 }) {
  const [active, setActive] = useState(false);
  const timerRef = useRef(null);

  const handleClick = (e) => {
    e.stopPropagation();
    if (active) {
      window.speechSynthesis?.cancel();
      setActive(false);
      clearTimeout(timerRef.current);
    } else {
      readAloud(text);
      setActive(true);
      // עצור אוטומטית אחרי זמן לפי אורך הטקסט
      timerRef.current = setTimeout(() => setActive(false), Math.max(3000, text.length * 100));
    }
  };

  useEffect(() => () => clearTimeout(timerRef.current), []);

  return (
    <button
      onClick={handleClick}
      title={active ? "לחץ לעצירה" : "לחץ לשמיעה בקול"}
      style={{
        background: active ? C.coral : C.sunL,
        border: `2.5px solid ${active ? C.coral : C.sun}`,
        borderRadius: "50%",
        width: size, height: size,
        cursor: "pointer",
        fontSize: size * 0.48,
        display: "flex", alignItems: "center", justifyContent: "center",
        flexShrink: 0,
        transition: "all .2s",
        boxShadow: active ? `0 0 12px ${C.coral}99` : `0 2px 6px ${C.sun}44`,
        animation: active ? "pulse 1s ease infinite" : "none",
      }}
    >
      {active ? "⏹" : "🔊"}
    </button>
  );
}

/* ══════════════════════════════════════════
   מיקרופון — לוחצים ומדברים, הטקסט נכתב
══════════════════════════════════════════ */
function MicBtn({ onResult, size = 42, label = "דבר בקול" }) {
  const [listening, setListening] = useState(false);
  const recRef = useRef(null);

  const toggle = async (e) => {
    e.stopPropagation();
    if (listening) {
      recRef.current?.stop();
      setListening(false);
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      alert("🎙️ זיהוי קול לא נתמך בדפדפן זה.\nנסה Google Chrome או Safari.");
      return;
    }
    // ודא הרשאת מיקרופון
    try {
      if (navigator.mediaDevices?.getUserMedia) {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(t => t.stop());
      }
    } catch {
      alert("❌ אין הרשאת מיקרופון.\nאשר אותה בהגדרות הדפדפן (לחץ על האייקון 🔒 בכתובת).");
      return;
    }
    try {
      const r = new SR();
      r.lang = "he-IL";
      r.continuous = false;
      r.interimResults = false;
      r.onresult = (ev) => {
        const t = ev.results[0][0].transcript;
        setListening(false);
        onResult(t);
      };
      r.onerror = (ev) => {
        setListening(false);
        if (ev.error === "not-allowed") alert("❌ אין הרשאת מיקרופון. אשר אותה בהגדרות הדפדפן.");
        else if (ev.error === "no-speech") alert("🤫 לא שמעתי כלום. נסה שוב!");
        else if (ev.error !== "aborted") console.warn("Mic error:", ev.error);
      };
      r.onend = () => setListening(false);
      recRef.current = r;
      r.start();
      setListening(true);
    } catch (err) {
      setListening(false);
      console.warn("Recognition error:", err);
    }
  };

  return (
    <button
      onClick={toggle}
      title={listening ? "לחץ לעצירה" : label}
      style={{
        background: listening ? C.coral : C.mintL,
        border: `2.5px solid ${listening ? C.coral : C.mint}`,
        borderRadius: "50%",
        width: size, height: size,
        cursor: "pointer",
        fontSize: size * 0.44,
        display: "flex", alignItems: "center", justifyContent: "center",
        flexShrink: 0,
        transition: "all .2s",
        boxShadow: listening ? `0 0 16px ${C.coral}99` : `0 2px 6px ${C.mint}44`,
        animation: listening ? "pulse 1s ease infinite" : "none",
      }}
    >
      {listening ? "⏺" : "🎙️"}
    </button>
  );
}

/* ══════════════════════════════════════════
   כפתור בחירה עם 🔊 ו-🎙️
══════════════════════════════════════════ */
function ChoiceButton({ text, onClick, disabled, isChosen, isGood }) {
  const bg = isChosen
    ? (isGood ? "#D4F5E2" : "#FFE5E0")
    : "#FAFAFA";
  const border = isChosen
    ? (isGood ? C.mint : C.coral)
    : "#E0E0E0";

  return (
    <div style={{
      background: bg,
      border: `2.5px solid ${border}`,
      borderRadius: 16,
      overflow: "hidden",
      marginBottom: 10,
      transition: "all .2s",
      boxShadow: isChosen ? `0 2px 10px ${border}55` : "0 1px 4px #0001",
    }}>
      {/* שורת הטקסט — לוחצים לבחור */}
      <button
        onClick={onClick}
        disabled={disabled}
        style={{
          width: "100%",
          background: "transparent",
          border: "none",
          padding: "13px 16px",
          cursor: disabled ? "default" : "pointer",
          fontFamily: "'Varela Round', sans-serif",
          fontSize: 15,
          color: C.dark,
          textAlign: "right",
          display: "flex",
          alignItems: "center",
          gap: 10,
          direction: "rtl",
        }}
      >
        <span style={{ fontSize: 22, flexShrink: 0 }}>
          {isChosen ? (isGood ? "✅" : "❌") : "💭"}
        </span>
        <span style={{ flex: 1, lineHeight: 1.5 }}>{text}</span>
      </button>

      {/* שורת כפתורי קול */}
      <div style={{
        borderTop: `1.5px solid ${border}44`,
        background: "#F7F7FF",
        padding: "7px 14px",
        display: "flex",
        alignItems: "center",
        gap: 10,
        direction: "rtl",
      }}>
        <SpeakBtn text={text} size={30} />
        <span style={{ fontFamily: "'Varela Round', sans-serif", fontSize: 11, color: C.soft }}>
          🔊 לחץ לשמוע
        </span>
        <div style={{ flex: 1 }} />
        <MicBtn
          size={30}
          label="אמור בקול ובחר!"
          onResult={() => { if (!disabled) onClick(); }}
        />
        <span style={{ fontFamily: "'Varela Round', sans-serif", fontSize: 11, color: C.mint }}>
          🎙️ אמור ובחר
        </span>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   SCENARIO PLAYER — מנוע הסיפור
══════════════════════════════════════════ */
function ScenarioPlayer({ sc, onBack, onWin }) {
  const [stepId, setStepId] = useState(sc.steps[0].id);
  const [chosen, setChosen] = useState(null); // index
  const [tip, setTip] = useState(null);
  const [busy, setBusy] = useState(false);
  const bottomRef = useRef(null);

  // מציאת step לפי id
  const getStep = (id) => sc.steps.find(s => s.id === id);
  const step = getStep(stepId);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [stepId]);

  // auto-advance לצמתים שאינם choice
  useEffect(() => {
    if (step && step.type === "char" && step.next) {
      const t = setTimeout(() => {
        setStepId(step.next);
        setChosen(null);
        setTip(null);
      }, 2200);
      return () => clearTimeout(t);
    }
  }, [stepId]);

  const pick = (choice, idx) => {
    if (busy || chosen !== null) return;
    setChosen(idx);
    setBusy(true);
    setTip({ text: choice.tip, good: choice.good });
    setTimeout(() => {
      setStepId(choice.next);
      setChosen(null);
      setTip(null);
      setBusy(false);
      if (getStep(choice.next)?.type === "end" && getStep(choice.next)?.good) {
        onWin();
      }
    }, choice.good ? 1800 : 2400);
  };

  if (!step) return null;

  // מסך סיום
  if (step.type === "end") {
    return (
      <div style={{
        minHeight: "100vh",
        background: step.good
          ? "linear-gradient(135deg, #D4F5E2, #FFF8EE)"
          : "linear-gradient(135deg, #FFE8E8, #FFF8EE)",
        display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
        direction: "rtl", padding: 24,
      }}>
        <div style={{ textAlign: "center", maxWidth: 380 }}>
          <div style={{ fontSize: 90 }}>{step.good ? "🌟" : "💙"}</div>
          <h2 style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 26, color: C.dark, margin: "12px 0 8px" }}>
            {step.good ? "כל הכבוד!" : "ניסיון טוב!"}
          </h2>
          <p style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 15, color: C.mid, lineHeight: 1.7, marginBottom: 16 }}>
            {step.msg}
          </p>
          {/* כפתור שמיעה לטקסט הסיום */}
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 14 }}>
            <SpeakBtn text={step.msg} size={40} />
          </div>
          {step.good && (
            <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 18, color: C.sun, marginBottom: 14 }}>
              +⭐ כוכב חדש!
            </div>
          )}
          <button
            onClick={() => { setStepId(sc.steps[0].id); setChosen(null); setTip(null); setBusy(false); }}
            style={btnS(sc.color)}
          >🔄 נסה שוב</button>
          <button onClick={onBack} style={{ ...btnS(C.mid), marginTop: 8 }}>← חזור לרשימה</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: `linear-gradient(160deg, ${sc.bg} 0%, #FFF8EE 100%)`, direction: "rtl" }}>
      {/* Header */}
      <div style={{ background: "#fff", borderBottom: `3px solid ${sc.color}44`, padding: "10px 14px", position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ maxWidth: 480, margin: "0 auto", display: "flex", alignItems: "center", gap: 10 }}>
          <button onClick={onBack} style={{ ...backS, margin: 0, padding: "5px 12px" }}>← חזור</button>
          <span style={{ fontSize: 22 }}>{sc.icon}</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 16, fontWeight: 700, color: C.dark }}>{sc.title}</div>
            <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 11, color: C.mid }}>{sc.category}</div>
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 480, margin: "0 auto", padding: "16px 14px" }}>
        {/* Intro */}
        <div style={{ background: "#fff", border: `2px solid ${sc.color}44`, borderRadius: 14, padding: "12px 14px", marginBottom: 18 }}>
          <div style={{ display: "flex", gap: 8, alignItems: "flex-start" }}>
            <SpeakBtn text={sc.intro} size={30} />
            <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 14, color: C.mid, lineHeight: 1.7 }}>
              📖 {sc.intro}
            </div>
          </div>
        </div>

        {/* Node */}
        {step.type === "char" && (
          <ChatBubble
            text={step.text}
            name={step.name}
            avatar={step.avatar}
            isYou={false}
            color={sc.color}
          />
        )}

        {step.type === "choice" && (
          <div style={{ background: "#fff", border: `2px solid ${C.sky}33`, borderRadius: 16, padding: "14px 14px", marginBottom: 12 }}>
            {/* שאלה עם כפתור שמיעה */}
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 12 }}>
              <SpeakBtn text={step.prompt} size={30} />
              <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 15, color: C.mid, fontWeight: 700, lineHeight: 1.5 }}>
                🤔 {step.prompt}
              </div>
            </div>

            {/* הסבר על הכפתורים */}
            <div style={{ display: "flex", gap: 14, marginBottom: 12, padding: "6px 10px", background: "#F0F0FF", borderRadius: 10 }}>
              <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
                <span style={{ background: C.sunL, borderRadius: "50%", width: 24, height: 24, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13 }}>🔊</span>
                <span style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 11, color: C.mid }}>לחץ לשמוע</span>
              </div>
              <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
                <span style={{ background: C.mintL, borderRadius: "50%", width: 24, height: 24, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13 }}>🎙️</span>
                <span style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 11, color: C.mid }}>אמור בקול ובחר</span>
              </div>
            </div>

            {/* הבחירות */}
            {step.choices.map((ch, i) => (
              <ChoiceButton
                key={i}
                text={ch.text}
                onClick={() => pick(ch, i)}
                disabled={chosen !== null}
                isChosen={chosen === i}
                isGood={ch.good}
              />
            ))}

            {/* טיפ אחרי בחירה */}
            {tip && (
              <div style={{
                background: tip.good ? "#D4F5E2" : "#FFF3CD",
                border: `2px solid ${tip.good ? C.mint : C.sun}`,
                borderRadius: 12,
                padding: "11px 14px",
                marginTop: 4,
                display: "flex",
                gap: 8,
                alignItems: "center",
                animation: "fadeIn .4s ease",
              }}>
                <SpeakBtn text={tip.text} size={28} />
                <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 14, color: C.dark }}>
                  {tip.good ? "🌟 " : "💡 "}{tip.text}
                </div>
              </div>
            )}
          </div>
        )}

        {step.type === "char" && (
          <div style={{ textAlign: "center", fontFamily: "'Varela Round',sans-serif", fontSize: 13, color: C.soft, marginTop: 8 }}>
            ⏳ ממשיך אוטומטית...
          </div>
        )}

        <div ref={bottomRef} />
      </div>
    </div>
  );
}

function AIChatScreen({ onBack, onEarnStar }) {
  const [sel, setSel] = useState(null);
  const [msgs, setMsgs] = useState([]);
  const [inp, setInp] = useState("");
  const [loading, setLoading] = useState(false);
  const [cnt, setCnt] = useState(0);
  const [starred, setStarred] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs]);

  const start = (ch) => { setSel(ch); setMsgs([{ role: "assistant", text: ch.hello }]); setCnt(0); setStarred(false); };

  const send = async () => {
    if (!inp.trim() || loading) return;
    const um = { role: "user", text: inp.trim() };
    const nm = [...msgs, um];
    setMsgs(nm); setInp(""); setLoading(true);
    const nc = cnt + 1; setCnt(nc);
    if (nc === 5 && !starred) { setStarred(true); onEarnStar(); }
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: `${sel.sys}\nענה תמיד בעברית בלבד. לפעמים שאל שאלה בחזרה.`,
          messages: nm.map(m => ({ role: m.role === "user" ? "user" : "assistant", content: m.text })),
        }),
      });
      const d = await r.json();
      const reply = d.content?.[0]?.text || "...";
      setMsgs(m => [...m, { role: "assistant", text: reply }]);
    } catch {
      setMsgs(m => [...m, { role: "assistant", text: "אוי... משהו השתבש 😊 נסה שוב!" }]);
    }
    setLoading(false);
  };

  const STARTERS = ["שלום! מה קוראים לך?", "מה התחביב שלך?", "אתה אוהב לשחק מה?", "יש לך חיות מחמד?", "מה הסרט האהוב עליך?", "מה למדתם היום?"];

  if (!sel) return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(135deg,#E3F4FF 0%,#FFF8EE 100%)", direction: "rtl" }}>
      <div style={{ maxWidth: 480, margin: "0 auto", padding: "18px 14px" }}>
        <button onClick={onBack} style={backS}>← חזור</button>
        <h2 style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 24, color: C.dark, marginBottom: 6 }}>🤖 שיחה חופשית עם AI</h2>
        <div style={{ background: C.sunL, border: `2px solid ${C.sun}`, borderRadius: 12, padding: "10px 14px", marginBottom: 18, fontFamily: "'Varela Round',sans-serif", fontSize: 13, color: C.dark }}>
          💡 בחר דמות ותתרגל שיחה חופשית! יש 🔊 על כל הודעה ו-🎙️ לדיבור. אחרי 5 הודעות תקבל ⭐
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          {AI_CHARS.map(ch => (
            <div key={ch.id} onClick={() => start(ch)} style={{ background: ch.bg, border: `3px solid ${ch.color}`, borderRadius: 20, padding: "16px 12px", cursor: "pointer", textAlign: "center", transition: "all .2s" }}>
              <div style={{ fontSize: 48, marginBottom: 6 }}>{ch.avatar}</div>
              <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 17, fontWeight: 700, color: C.dark }}>{ch.name}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  return (
    <div style={{ height: "100vh", background: `linear-gradient(160deg,${sel.bg} 0%,#FFF8EE 100%)`, direction: "rtl", display: "flex", flexDirection: "column" }}>
      <div style={{ background: "#fff", borderBottom: `3px solid ${sel.color}44`, padding: "9px 12px", flexShrink: 0 }}>
        <div style={{ maxWidth: 480, margin: "0 auto", display: "flex", alignItems: "center", gap: 9 }}>
          <button onClick={() => setSel(null)} style={{ ...backS, margin: 0, padding: "5px 12px" }}>←</button>
          <span style={{ fontSize: 28 }}>{sel.avatar}</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 16, fontWeight: 700, color: C.dark }}>{sel.name}</div>
            <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 11, color: C.mint }}>● מחובר</div>
          </div>
          <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 12, color: C.mid }}>{cnt}/5 {starred ? "⭐" : ""}</div>
        </div>
        <div style={{ maxWidth: 480, margin: "6px auto 0", display: "flex", gap: 5, flexWrap: "wrap" }}>
          {STARTERS.map(s => (
            <button key={s} onClick={() => setInp(s)} style={{ background: "#fff", border: `1.5px solid ${sel.color}`, borderRadius: 99, padding: "3px 10px", cursor: "pointer", fontFamily: "'Varela Round',sans-serif", fontSize: 11, color: C.dark }}>
              {s}
            </button>
          ))}
        </div>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "12px 14px", display: "flex", flexDirection: "column", gap: 4, maxWidth: 480, width: "100%", margin: "0 auto", boxSizing: "border-box" }}>
        {msgs.map((m, i) => (
          <ChatBubble
            key={i}
            text={m.text}
            name={m.role === "user" ? "אתה" : sel.name}
            avatar={m.role === "user" ? "🧒" : sel.avatar}
            isYou={m.role === "user"}
            color={sel.color}
          />
        ))}
        {loading && (
          <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
            <span style={{ fontSize: 28 }}>{sel.avatar}</span>
            <div style={{ background: "#fff", border: "2px solid #EEE", borderRadius: "20px 20px 20px 4px", padding: "12px 16px", fontFamily: "'Varela Round',sans-serif", fontSize: 15, color: C.soft }}>✍️ כותב...</div>

        <div ref={bottomRef} />

      <div style={{ background: "#fff", borderTop: "2px solid #EEE", padding: "8px 12px", flexShrink: 0 }}>
        <div style={{ maxWidth: 480, margin: "0 auto", display: "flex", gap: 7 }}>
          <MicBtn onResult={t => setInp(t)} size={42} label="דבר בקול" />
          <input
            value={inp}
            onChange={e => setInp(e.target.value)}
            onKeyDown={e => e.key === "Enter" && send()}
            placeholder="כתוב הודעה..."
            style={{ flex: 1, border: `2px solid ${sel.color}66`, borderRadius: 12, padding: "10px 12px", fontFamily: "'Varela Round',sans-serif", fontSize: 14, color: C.dark, direction: "rtl" }}
          />
          <button onClick={send} disabled={!inp.trim() || loading}
            style={{ background: sel.color, border: "none", borderRadius: 12, width: 44, height: 44, cursor: "pointer", fontSize: 20, opacity: inp.trim() && !loading ? 1 : 0.4, flexShrink: 0 }}>←</button>
        </div>
      </div>
    </div>
  );
}

            {EMOTIONS.map(em => (
              <button key={em.id} onClick={() => setDEm(dEm?.id === em.id ? null : em)}
                style={{ background: dEm?.id === em.id ? em.color : em.bg, border: `2px solid ${em.color}`, borderRadius: 99, padding: "7px 10px", cursor: "pointer", fontSize: 20, transition: "all .2s" }}>
                {em.emoji}
              </button>
            ))}
          </div>
          {dEm && (
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 8 }}>
              <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 13, color: dEm.color }}>בחרת: {dEm.heb} {dEm.emoji}</div>
              <SpeakBtn text={`${dEm.heb}. ${dEm.tip}`} size={26} />

          <div style={{ display: "flex", gap: 7, marginBottom: 9 }}>
            <textarea value={dNote} onChange={e => setDNote(e.target.value)} placeholder="כתוב מה קרה (לא חובה)..."

          </div>
          <button onClick={() => { if (!dEm) return; setDiary(d => [{ emotion: dEm, note: dNote, time: new Date().toLocaleTimeString("he-IL", { hour: "2-digit", minute: "2-digit" }) }, ...d]); setDEm(null); setDNote(""); }}
            disabled={!dEm}
            style={{ ...btnS(C.purple), opacity: dEm ? 1 : 0.5 }}>+ הוסף לרשימה</button>
        </div>
        {diary.length === 0 && <div style={{ textAlign: "center", fontFamily: "'Varela Round',sans-serif", fontSize: 13, color: C.soft, padding: 20 }}>עדיין לא הוספת רגשות 🌈</div>}
        {diary.map((d, i) => (
          <div key={i} style={{ background: d.emotion.bg, border: `2px solid ${d.emotion.color}`, borderRadius: 14, padding: "10px 12px", display: "flex", gap: 9, alignItems: "flex-start", marginBottom: 9 }}>

            </div>
            <SpeakBtn text={`${d.emotion.heb}. ${d.note || ""}`} size={26} />
          </div>
        ))}
      </div>
    </div>
  );

  // תפריט
  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(135deg,#FFF5D0 0%,#FFF8EE 100%)", direction: "rtl" }}>
      <div style={{ maxWidth: 480, margin: "0 auto", padding: "18px 14px" }}>

function FloatingChatBot({ onClose }) {
  const [msgs, setMsgs] = useState([
    { role: "assistant", text: "היי! אני קלי, העוזר/ת החברתי/ת שלך 🌈\nאני יכול/ה לעזור לך עם:\n• עצות לסיטואציות חברתיות\n• הסבר על רגשות\n• לעבד יחד אירועים מהיום\n\nעל מה תרצה לדבר?" }
  ]);
  const [inp, setInp] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs]);

  const send = async () => {
    if (!inp.trim() || loading) return;
    const um = { role: "user", text: inp.trim() };
    const nm = [...msgs, um];
    setMsgs(nm); setInp(""); setLoading(true);

    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1024,
          system: "אתה קלי, יועץ ידידותי וחם לילדים על הספקטרום האוטיסטי. ענה תמיד בעברית פשוטה וברורה. תן עצות מעשיות וקצרות. הבע אכפתיות. אל תשפוט. תמיד עודד ניסיון ולמידה. כשהילד מתאר מצב חברתי — תן 2-3 רעיונות ספציפיים מה לעשות. אם נראה שמדובר במצוקה אמיתית — תזכיר לפנות להורה או מבוגר. לא יותר מ-4 משפטים בתגובה.",
          messages: nm.map(m => ({ role: m.role === "user" ? "user" : "assistant", content: m.text })),
        }),
      });
      const d = await r.json();
      const reply = d.content?.[0]?.text || "סליחה, משהו השתבש. נסה שוב 😊";
      setMsgs(m => [...m, { role: "assistant", text: reply }]);
    } catch {
      setMsgs(m => [...m, { role: "assistant", text: "אוי, יש בעיה בחיבור. בדוק אינטרנט ונסה שוב 💙" }]);
    }
    setLoading(false);
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.65)", zIndex: 5000, display: "flex", alignItems: "flex-end", justifyContent: "center", direction: "rtl" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: "#fff", borderRadius: "28px 28px 0 0", width: "100%", maxWidth: 480, height: "85vh", display: "flex", flexDirection: "column" }}>
        {/* Header */}
        <div style={{ background: `linear-gradient(135deg, ${C.purple}, ${C.sky})`, padding: "14px 18px", borderRadius: "28px 28px 0 0", display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 44, height: 44, borderRadius: "50%", background: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24 }}>🌈</div>
          <div style={{ flex: 1, color: "#fff" }}>
            <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 16, fontWeight: 700 }}>קלי - עוזר חברתי</div>
            <div style={{ fontFamily: "'Varela Round',sans-serif", fontSize: 11, opacity: 0.9 }}>● זמין/ה לעזור</div>
          </div>
          <button onClick={onClose} style={{ background: "rgba(255,255,255,0.25)", border: "none", borderRadius: "50%", width: 34, height: 34, cursor: "pointer", fontSize: 18, color: "#fff" }}>✕</button>
        </div>

        {/* Messages */}
        <div style={{ flex: 1, overflowY: "auto", padding: "14px", display: "flex", flexDirection: "column", gap: 10 }}>
          {msgs.map((m, i) => {
            const isU = m.role === "user";
            return (
              <div key={i} style={{ display: "flex", gap: 8, alignItems: "flex-end", flexDirection: isU ? "row-reverse" : "row" }}>
                <span style={{ fontSize: 28, flexShrink: 0 }}>{isU ? "🧒" : "🌈"}</span>
                <div style={{ display: "flex", flexDirection: "column", alignItems: isU ? "flex-end" : "flex-start", maxWidth: "75%" }}>
                  <div style={{
                    background: isU ? C.purple : "#F0F0FF",
                    border: `2px solid ${isU ? C.purple : "#DDD0FF"}`,
                    borderRadius: isU ? "18px 18px 4px 18px" : "18px 18px 18px 4px",
                    padding: "10px 14px",
                    fontFamily: "'Varela Round',sans-serif",
                    fontSize: 14,
                    color: isU ? "#fff" : C.dark,
                    lineHeight: 1.6,
                    whiteSpace: "pre-line",
                  }}>
                    {m.text}
                  </div>
                  {!isU && <div style={{ marginTop: 4 }}><SpeakBtn text={m.text} size={26} /></div>}
                </div>
              </div>
            );
          })}
          {loading && (
            <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
              <span style={{ fontSize: 28 }}>🌈</span>
              <div style={{ background: "#F0F0FF", border: "2px solid #DDD0FF", borderRadius: "18px 18px 18px 4px", padding: "10px 14px", fontFamily: "'Varela Round',sans-serif", fontSize: 14, color: C.soft }}>

          )}
          <div ref={bottomRef} />
        </div>

        {/* Quick suggestions */}
        <div style={{ padding: "8px 14px", borderTop: "2px solid #EEE", display: "flex", gap: 6, flexWrap: "wrap" }}>
          {["איך אני מתחיל שיחה?", "פחדתי לדבר היום", "מישהו צחק עליי", "איך לעזור לחבר עצוב?"].map(q => (
            <button key={q} onClick={() => setInp(q)}
              style={{ background: "#fff", border: `1.5px solid ${C.purple}`, borderRadius: 99, padding: "4px 10px", cursor: "pointer", fontFamily: "'Varela Round',sans-serif", fontSize: 11, color: C.purple }}>
              {q}
            </button>
          ))}
        </div>

        {/* Input */}
        <div style={{ padding: "10px 14px", borderTop: "2px solid #EEE", display: "flex", gap: 7 }}>
          <MicBtn onResult={t => setInp(t)} size={42} />
          <input value={inp} onChange={e => setInp(e.target.value)} onKeyDown={e => e.key === "Enter" && send()}
            placeholder="כתוב הודעה..."
            style={{ flex: 1, border: `2px solid ${C.purple}66`, borderRadius: 12, padding: "10px 12px", fontFamily: "'Varela Round',sans-serif", fontSize: 14, color: C.dark, direction: "rtl" }}/>
          <button onClick={send} disabled={!inp.trim() || loading}
            style={{ background: C.purple, border: "none", borderRadius: 12, width: 44, height: 44, cursor: "pointer", fontSize: 20, color: "#fff", opacity: inp.trim() && !loading ? 1 : 0.4 }}>←</button>
        </div>
      </div>
    </div>
  );
}

const DEFAULT_A11Y = {
  fontSize: 16,
  contrast: "normal",
  voiceType: "child",
  voiceRate: 1,
  voicePitch: 1.5,
  autoRead: false,
  noAnim: false,
  bigButtons: false,
  dyslexiaFont: false,
  lineSpacing: false,
  highlightFocus: false,
  soundEffects: true,
};

function App() {
  const [screen, setScreen] = useState("home");
  const [stars, setStars] = useState(() => { try { return parseInt(localStorage.getItem(LS.s) || "0"); } catch { return 0; } });
  const [doneIds, setDoneIds] = useState(() => { try { return new Set(JSON.parse(localStorage.getItem(LS.d) || "[]")); } catch { return new Set(); } });
  const [burst, setBurst] = useState(false);
  const [permsReady, setPermsReady] = useState(() => {
    try { return localStorage.getItem("kq_perms") === "1"; } catch { return false; }
  });
  const [showA11y, setShowA11y] = useState(false);
  const [showBot, setShowBot] = useState(false);
  const [a11y, setA11y] = useState(() => {
    try { return { ...DEFAULT_A11Y, ...JSON.parse(localStorage.getItem("kq_a11y") || "{}") }; } catch { return DEFAULT_A11Y; }
  });

  // טעינת קולות בכניסה
  useEffect(() => { loadVoices(); }, []);

  // עדכון קול כש-a11y משתנה
  useEffect(() => { currentVoiceType = a11y.voiceType; }, [a11y.voiceType]);

  const updateA11y = (key, val) => {
    if (key === "__reset") {
      setA11y(DEFAULT_A11Y);
      try { localStorage.setItem("kq_a11y", JSON.stringify(DEFAULT_A11Y)); } catch {}
      return;
    }
    setA11y(p => {
      const n = { ...p, [key]: val };
      try { localStorage.setItem("kq_a11y", JSON.stringify(n)); } catch {}
      return n;
    });
  };

  const earn = (scId) => {
    setStars(s => { const n = s + 1; try { localStorage.setItem(LS.s, String(n)); } catch {} return n; });
    if (scId) setDoneIds(p => { const next = new Set(p); next.add(scId); try { localStorage.setItem(LS.d, JSON.stringify([...next])); } catch {} return next; });
    setBurst(true); setTimeout(() => setBurst(false), 1200);
  };

  const handleReady = () => {
    try { localStorage.setItem("kq_perms", "1"); } catch {}
    setPermsReady(true);
  };

  // יישום הגדרות נגישות גלובלית
  const a11yStyle = {
    fontSize: a11y.fontSize,
    fontFamily: a11y.dyslexiaFont ? "'Arial', sans-serif" : "'Varela Round', sans-serif",
    lineHeight: a11y.lineSpacing ? 2 : undefined,
    filter: a11y.contrast === "high" ? "contrast(1.3)" : a11y.contrast === "dark" ? "invert(0.92) hue-rotate(180deg)" : undefined,
  };

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Varela+Round&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Varela Round', sans-serif; background: #FFF8EE; overflow-x: hidden; }
        input, textarea { outline: none; }
        button:active { transform: scale(.97) !important; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #4FB3F655; border-radius: 99px; }
        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
      `}</style>

      {/* כוכב אנימציה */}
      {burst && (
        <div style={{ position: "fixed", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none", zIndex: 9999 }}>
          <div style={{ fontSize: 110, animation: "fadeIn .3s ease" }}>⭐</div>
        </div>
      )}

      {!permsReady && <PermissionsScreen onReady={handleReady} />}
      
      {permsReady && (
        <div style={a11yStyle}>
          {screen === "home"         && <HomeScreen onNavigate={setScreen} stars={stars} doneIds={doneIds} />}
          {screen === "scenarios"    && <ScenariosScreen onBack={() => setScreen("home")} onEarnStar={earn} doneIds={doneIds} />}
          {screen === "aichat"       && <AIChatScreen onBack={() => setScreen("home")} onEarnStar={() => earn(null)} />}
          {screen === "emotions"     && <EmotionsScreen onBack={() => setScreen("home")} onEarnStar={() => earn(null)} />}
          {screen === "achievements" && <AchievementsScreen onBack={() => setScreen("home")} stars={stars} doneIds={doneIds} />}
          {screen === "about"        && <AboutScreen onBack={() => setScreen("home")} />}

          {/* כפתורי נגישות וצ'אט בוט צפים */}
          <div style={{ position: "fixed", bottom: 20, left: 16, display: "flex", flexDirection: "column", gap: 12, zIndex: 100 }}>
            {/* Accessibility */}
            <button onClick={() => setShowA11y(true)} title="הגדרות נגישות"
              style={{
                background: `linear-gradient(135deg, ${C.purple}, ${C.sky})`,
                border: "3px solid #fff",
                borderRadius: "50%",
                width: 56, height: 56,
                cursor: "pointer",
                fontSize: 26,
                color: "#fff",
                boxShadow: `0 6px 20px ${C.purple}88, 0 0 0 2px ${C.purple}44`,
                display: "flex", alignItems: "center", justifyContent: "center",
                transition: "all .2s",
                animation: "pulse 3s ease infinite",
              }}>
              ♿
            </button>
            
            {/* Chatbot */}
            <button onClick={() => setShowBot(true)} title="עוזר חברתי - קלי"
              style={{
                background: `linear-gradient(135deg, ${C.coral}, ${C.sun})`,
                border: "3px solid #fff",
                borderRadius: "50%",
                width: 56, height: 56,
                cursor: "pointer",
                fontSize: 26,
                color: "#fff",
                boxShadow: `0 6px 20px ${C.coral}88, 0 0 0 2px ${C.coral}44`,
                display: "flex", alignItems: "center", justifyContent: "center",
                transition: "all .2s",
                position: "relative",
              }}>
              💬
              <span style={{
                position: "absolute",
                top: -4, right: -4,
                background: C.mint, color: "#fff",
                borderRadius: "50%",
                width: 20, height: 20,
                fontSize: 12,
                display: "flex", alignItems: "center", justifyContent: "center",
                border: "2px solid #fff",
                fontFamily: "'Varela Round',sans-serif",
                fontWeight: 700,
              }}>!</span>
            </button>
          </div>

          {showA11y && <AccessibilityPanel a11y={a11y} onChange={updateA11y} onClose={() => setShowA11y(false)} />}
          {showBot && <FloatingChatBot onClose={() => setShowBot(false)} />}
        </div>
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));

window.addEventListener('load', () => {
  setTimeout(() => {
    const s = document.getElementById('splash');
    if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 500); }
  }, 600);
});
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
